{% extends "base.html" %}

{% block content %}
<div class="player-container bg-black overflow-hidden position-relative" style="height: calc(100vh - 56px); margin-top: -32px;">
    <!-- Background Blur Effect -->
    <div class="bg-blur position-absolute w-100 h-100" style="background: radial-gradient(circle at 20% 30%, rgba(13, 110, 253, 0.15) 0%, rgba(0,0,0,0) 70%); pointer-events: none;"></div>

    <div class="d-flex h-100 w-100 player-main-flex">
        <!-- Sidebar -->
        <div id="sidebar" class="glass-sidebar d-flex flex-column border-end border-white border-opacity-10 transition-all active" style="width: 320px; z-index: 1000;">
            <div class="p-3 mobile-sidebar-controls">
                <div class="d-flex align-items-center justify-content-between mb-3 desktop-only-header">
                    <h5 class="fw-bold mb-0 text-white shadow-sm">Channels</h5>
                    <button id="toggleSidebar" class="btn btn-link text-white p-0 opacity-75 hover-opacity-100 transition-all">
                        <i class="bi bi-layout-sidebar-inset fs-4"></i>
                    </button>
                </div>
                
                <div class="d-flex gap-1 mb-2 mobile-selectors-row">
                    <select id="playlistSelector" class="form-select form-select-sm bg-white bg-opacity-10 border-0 text-white shadow-none w-50" style="border-radius: 0.5rem; cursor: pointer; font-size: 0.75rem;">
                        {% for pl in playlists %}
                        <option value="{{ pl.id }}" class="bg-dark">{{ pl.name }}</option>
                        {% endfor %}
                    </select>
                    <select id="categorySelector" class="form-select form-select-sm bg-white bg-opacity-10 border-0 text-white shadow-none w-50" style="border-radius: 0.5rem; cursor: pointer; font-size: 0.75rem;">
                        <option value="" class="bg-dark">All Categories</option>
                    </select>
                </div>

                <div class="input-group input-group-sm">
                    <input type="text" id="channelSearch" class="form-control bg-white bg-opacity-10 border-0 text-white shadow-none" placeholder="Find channels..." style="border-radius: 0.5rem 0 0 0.5rem;">
                    <button class="btn btn-outline-secondary bg-white bg-opacity-10 border-0 text-white" type="button" id="clearSearch"><i class="bi bi-x"></i></button>
                    <button class="btn btn-primary border-0" type="button" id="searchBtn"><i class="bi bi-search"></i></button>
                </div>
            </div>
            
            <div id="channelList" class="flex-grow-1 overflow-auto custom-scrollbar px-3 pb-4">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="flex-grow-1 position-relative d-flex flex-column h-100 player-content-wrapper">
            <!-- Sidebar Re-open Button (Floating) -->
            <button id="openSidebar" class="btn btn-primary shadow-lg rounded-circle position-absolute top-50 start-0 translate-middle ms-4 d-none" style="z-index: 1001; width: 45px; height: 45px;">
                <i class="bi bi-chevron-right"></i>
            </button>

            <!-- Player Container -->
            <div id="playerArea" class="flex-grow-1 bg-black d-flex flex-column align-items-center justify-content-center">
                <div id="videoContainer" class="w-100 h-100 position-relative d-none">
                    <video id="video" class="w-100 h-100" controls crossorigin playsinline style="object-fit: contain;"></video>
                    
                    <!-- Custom Top Controls -->
                    <div id="topControls" class="position-absolute top-0 start-0 w-100 p-2 d-flex justify-content-between align-items-center transition-all opacity-0" style="z-index: 1010; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);">
                        <div class="d-flex gap-3">
                            <button id="customPlayPause" class="btn btn-link text-white p-0 fs-4"><i class="bi bi-pause-fill"></i></button>
                            <button id="customMute" class="btn btn-link text-white p-0 fs-4"><i class="bi bi-volume-up-fill"></i></button>
                        </div>
                        <div id="streamClock" class="text-white small fw-bold opacity-75">LIVE</div>
                    </div>

                    <div id="playbackOverlay" class="position-absolute top-50 start-50 translate-middle text-center d-none">
                        <div class="spinner-grow text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
                        <h5 class="fw-bold text-white letter-spacing-1">BUFFERING...</h5>
                    </div>
                </div>

                <div id="idleScreen" class="text-center p-5 scale-in">
                    <div class="display-1 text-primary opacity-50 mb-4 hvr-bounce-in"><i class="bi bi-play-circle-fill"></i></div>
                    <h2 class="fw-bold text-white mb-2">Ready to Watch</h2>
                    <p class="text-muted mb-0">Select a channel from the menu to start your stream.</p>
                </div>
            </div>

            <div id="channelInfo" class="p-5 glass-footer border-top border-white border-opacity-10 d-none">
                <div class="container-fluid px-0">
                    <div class="d-flex align-items-center gap-5 info-flex-container">
                        <div class="logo-wrapper position-relative">
                            <div class="logo-glow position-absolute w-100 h-100 blur-20 bg-primary opacity-50"></div>
                            <img id="currentLogo" src="" alt="" class="rounded-3 position-relative bg-white p-2 shadow-lg" style="height: 100px; width: 100px; object-fit: contain; border: 4px solid rgba(255,255,255,0.15);">
                        </div>
                        <div class="flex-grow-1 info-text-container">
                            <div class="d-flex align-items-center gap-2 mb-2 name-group-container flex-wrap">
                                <h1 id="currentName" class="mb-0 fw-bold text-white display-5"></h1>
                                <span id="currentGroup" class="badge rounded-pill bg-primary text-white border-0 px-3 py-1 shadow-sm" style="font-size: 0.85rem; letter-spacing: 1px;"></span>
                                <span id="streamTypeBadge" class="badge rounded-pill bg-info text-dark border-0 px-3 py-1 shadow-sm fw-bold" style="font-size: 0.75rem; display: none;">IPTV</span>
                            </div>
                            <div class="d-flex align-items-center gap-4 badges-container">
                                <span id="statusContainer" class="d-flex align-items-center gap-2 px-3 py-2 rounded-2 bg-success text-white fw-bold shadow-sm" style="font-size: 0.85rem; letter-spacing: 1px;">
                                    <i class="bi bi-broadcast"></i> <span id="statusLabel">LIVE</span>
                                </span>
                                <div class="d-flex align-items-center text-white gap-4 bg-white bg-opacity-10 px-4 py-2 rounded-pill shadow-inner tech-details-badge">
                                    <span class="small fw-bold border-end border-white border-opacity-25 pe-4 quality-span">
                                        <i class="bi bi-speedometer2 me-2"></i> <span id="qualityLabel">Checking...</span>
                                    </span>
                                    <span id="resBadge" class="fw-bold res-span" style="font-size: 0.85rem; letter-spacing: 2px;">SD</span>
                                    <span class="small text-white-50 border-start border-white border-opacity-25 ps-4 time-span">
                                        <i class="bi bi-clock me-1"></i> CONTINUOUS
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex gap-4 action-buttons-container">
                            <button id="vlcBtn" class="btn btn-outline-warning border-opacity-25 rounded-circle hvr-push shadow-lg action-btn" title="Play with VLC" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"><i class="bi bi-play-btn-fill"></i></button>
                            <button class="btn btn-outline-light border-opacity-25 rounded-circle hvr-push shadow-lg action-btn" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"><i class="bi bi-heart-fill"></i></button>
                            <button class="btn btn-outline-light border-opacity-25 rounded-circle hvr-push shadow-lg action-btn" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"><i class="bi bi-share-fill"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);

        .glass-footer {
            position: absolute !important;
            bottom: 0 !important;

            left: 0;

            padding: 4px 8px !important;
            min-height: auto !important;

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(13, 110, 253, 0.5); }

        animation: scaleIn 0.5s ease-out;

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('video');
    const sidebar = document.getElementById('sidebar');
    const playerArea = document.getElementById('playerArea');
    const videoContainer = document.getElementById('videoContainer');
    const idleScreen = document.getElementById('idleScreen');
    const playlistSelector = document.getElementById('playlistSelector');
    const categorySelector = document.getElementById('categorySelector');
    const channelList = document.getElementById('channelList');
    const channelSearch = document.getElementById('channelSearch');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const openSidebar = document.getElementById('openSidebar');
    const overlay = document.getElementById('playbackOverlay');
    
    let hls = null;
    let allChannels = [];
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let currentPlaylistId = null;
    let currentCategory = "";
    let lastGroup = null;
    let currentStreamUrl = null;
    const initialChannelId = {{ initial_id|tojson if initial_id else 'null' }};

    // Sidebar Toggling
    function toggleSidebarUI(show) {
        if (window.innerWidth <= 768) {
            if (show) {
                sidebar.classList.add('mobile-active');
                document.getElementById('mobileOverlay').classList.add('active');
            } else {
                sidebar.classList.remove('mobile-active');
                document.getElementById('mobileOverlay').classList.remove('active');
            }
        } else {
            if (show) {
                sidebar.classList.remove('collapsed');
                openSidebar.classList.add('d-none');
            } else {
                sidebar.classList.add('collapsed');
                openSidebar.classList.remove('d-none');
            }
        }
    }

    if (window.innerWidth <= 768) {
        // On mobile, ensure sidebar is visible and toggle buttons are hidden
        sidebar.classList.remove('collapsed');
        toggleSidebar.parentElement.classList.add('d-none');
        openSidebar.classList.add('d-none');
    }

    toggleSidebar.addEventListener('click', () => toggleSidebarUI(false));
    openSidebar.addEventListener('click', () => toggleSidebarUI(true));

    async function loadPlaylist(playlistId, autoPlayFirst = false) {
        currentPlaylistId = playlistId;
        currentPage = 1;
        hasMore = true;
        lastGroup = null;
        currentCategory = "";
        categorySelector.value = "";
        channelList.innerHTML = '';
        
        // Load Categories
        fetchCategories(playlistId);
        
        await fetchChannels(1, autoPlayFirst);
    }

    async function fetchCategories(playlistId) {
        try {
            const resp = await fetch(`/channels/web-player/categories/${playlistId}`);
            const data = await resp.json();
            if (data.status === 'ok') {
                let html = '<option value="" class="bg-dark">All Categories</option>';
                data.categories.forEach(cat => {
                    html += `<option value="${cat}" class="bg-dark">${cat}</option>`;
                });
                categorySelector.innerHTML = html;
            }
        } catch (err) { console.error(err); }
    }

    async function fetchChannels(page, autoPlayFirst = false) {
        if (isLoading || !hasMore) return;
        isLoading = true;
        
        const loader = document.createElement('div');
        loader.id = 'listLoader';
        loader.className = 'text-center py-3';
        loader.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div>';
        channelList.appendChild(loader);

        let url = `/channels/web-player/channels/${currentPlaylistId}?page=${page}&limit=100`;
        if (currentCategory) url += `&group=${encodeURIComponent(currentCategory)}`;
        const q = channelSearch.value.trim();
        if (q) url += `&q=${encodeURIComponent(q)}`;

        try {
            const resp = await fetch(url);
            const data = await resp.json();
            
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();

            if (data.status === 'ok') {
                renderChannels(data.channels);
                hasMore = data.has_more;
                currentPage = data.page;
                
                if (autoPlayFirst && page === 1 && data.channels.length > 0) {
                    const firstChannel = data.channels[0];
                    playStream(firstChannel.play_url, firstChannel);
                    setTimeout(() => {
                        const firstItem = document.querySelector('.channel-item');
                        if (firstItem) firstItem.classList.add('active');
                    }, 100);
                }
            }
        } catch (err) {
            console.error(err);
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();
        } finally {
            isLoading = false;
        }
    }

    function renderChannels(channels) {
        let html = '';
        const isSearching = channelSearch.value.trim().length > 0;
        
        channels.forEach(ch => {
            // Only show group headers if not searching
            if (!isSearching && ch.group !== lastGroup) {
                html += `<div class="group-header text-white text-uppercase fw-bold shadow-sm">${ch.group}</div>`;
                lastGroup = ch.group;
            }
            
            const statusColor = ch.status === 'live' ? '#2ecc71' : (ch.status === 'die' ? '#e74c3c' : '#95a5a6');
            
            html += `
                <div class="channel-item p-2 d-flex align-items-center gap-3 transition-all" 
                     data-id="${ch.id}" data-url="${ch.play_url}" data-name="${ch.name}" data-logo="${ch.logo}" data-group="${ch.group}">
                    <div class="logo-container">
                        <img src="${ch.logo || 'https://via.placeholder.com/40'}" class="w-100 h-100" style="object-fit: contain;">
                    </div>
                    <div class="flex-grow-1 overflow-hidden">
                        <div class="text-white text-truncate fw-medium" style="font-size: 0.95rem;">${ch.name}</div>
                        <div class="d-flex align-items-center gap-2 mt-1">
                            <span style="width: 8px; height: 8px; border-radius: 50%; background-color: ${statusColor};" title="${ch.status}"></span>
                            <span class="text-light text-truncate" style="font-size: 0.75rem;">
                                ${ch.quality && ch.quality !== 'N/A' ? ch.quality + ' • ' : ''}${ch.resolution && ch.resolution !== 'N/A' ? ch.resolution : ''}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        });
        
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        while (tempDiv.firstChild) {
            const child = tempDiv.firstChild;
            if (child.classList && child.classList.contains('channel-item')) {
                child.addEventListener('click', () => {
                    document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
                    child.classList.add('active');
                    playStream(child.dataset.url, child.dataset);
                });
            }
            channelList.appendChild(child);
        }
    }

    // Category Selector
    categorySelector.addEventListener('change', (e) => {
        currentCategory = e.target.value;
        currentPage = 1;
        hasMore = true;
        lastGroup = null;
        channelList.innerHTML = '';
        fetchChannels(1, false);
    });

    // Scroll Listener
    channelList.addEventListener('scroll', () => {
        if (channelList.scrollTop + channelList.offsetHeight >= channelList.scrollHeight - 300) {
            if (!isLoading && hasMore) {
                fetchChannels(currentPage + 1);
            }
        }
    });

    function updateStatusToLive(id) {
        if (!id) return;
        const item = document.querySelector(`.channel-item[data-id="${id}"]`);
        if (item) {
            const dot = item.querySelector('span[style*="border-radius: 50%"]');
            if (dot) dot.style.backgroundColor = '#2ecc71';
        }
        
        const infoBar = document.getElementById('channelInfo');
        if (infoBar.dataset.currentId == id) {
            const statusContainer = document.getElementById('statusContainer');
            const statusLabel = document.getElementById('statusLabel');
            if (statusContainer) {
                statusContainer.className = `d-flex align-items-center gap-2 px-3 py-2 rounded-2 bg-success text-white fw-bold shadow-sm`;
            }
            if (statusLabel) statusLabel.innerText = 'LIVE';
        }
    }

    async function fetchChannelStatus(id, retry = true) {
        try {
            const resp = await fetch(`/channels/check/${id}?ajax=1`, { method: 'POST' });
            const data = await resp.json();
            if (data.success) {
                // If live but no quality, retry once after 1s
                if (data.status === 'live' && (!data.quality || data.quality === 'N/A' || data.quality === 'null') && retry) {
                    setTimeout(() => fetchChannelStatus(id, false), 1000);
                }

                // Update Sidebar Item
                const item = document.querySelector(`.channel-item[data-id="${id}"]`);
                if (item) {
                    const dot = item.querySelector('span[style*="border-radius: 50%"]');
                    const text = item.querySelector('span.text-light');
                    const statusColor = data.status === 'live' ? '#2ecc71' : (data.status === 'die' ? '#e74c3c' : '#95a5a6');
                    if (dot) dot.style.backgroundColor = statusColor;
                    if (text) {
                        let info = [];
                        if (data.quality && data.quality !== 'N/A') info.push(data.quality);
                        if (data.resolution && data.resolution !== 'N/A') info.push(data.resolution);
                        text.innerText = info.join(' • ');
                    }
                }

                // Update Bottom Bar
                const infoBar = document.getElementById('channelInfo');
                if (infoBar.dataset.currentId == id) {
                    const statusContainer = document.getElementById('statusContainer');
                    const statusLabel = document.getElementById('statusLabel');
                    if (statusContainer) {
                        statusContainer.className = `d-flex align-items-center gap-2 px-3 py-2 rounded-2 ${data.status === 'live' ? 'bg-success' : 'bg-danger'} text-white fw-bold shadow-sm`;
                    }
                    if (statusLabel) statusLabel.innerText = data.status.toUpperCase();

                    const qualityLabel = document.getElementById('qualityLabel');
                    if (qualityLabel) {
                        const q = data.quality && data.quality !== 'N/A' ? data.quality.toUpperCase() : '';
                        qualityLabel.innerText = q ? `${q} • ${data.latency}MS` : `${data.latency}MS`;
                        if (!q && !data.latency) qualityLabel.parentElement.classList.add('d-none');
                        else qualityLabel.parentElement.classList.remove('d-none');
                    }
                    
                    const resBadge = document.getElementById('resBadge');
                    if (resBadge) {
                        resBadge.innerText = data.resolution || 'SD';
                        if (resBadge.innerText.includes('1920x1080')) resBadge.innerText = 'FHD 1080P';
                        else if (resBadge.innerText.includes('3840x2160')) resBadge.innerText = 'ULTRA HD 4K';
                        else if (resBadge.innerText.includes('1280x720')) resBadge.innerText = 'HD 720P';
                    }
                }
            }
        } catch (err) { console.error("Check failed:", err); }
    }

    function playStream(url, meta) {
        if (hls) hls.destroy();
        currentStreamUrl = url;
        
        // Update URL for sticky refresh
        const newUrl = new URL(window.location.href);
        newUrl.searchParams.set('id', meta.id);
        window.history.replaceState({}, '', newUrl);

        idleScreen.classList.add('d-none');
        videoContainer.classList.remove('d-none');
        overlay.classList.remove('d-none');
        
        // Update Info
        const infoBar = document.getElementById('channelInfo');
        const streamTypeBadge = document.getElementById('streamTypeBadge');
        infoBar.classList.remove('d-none');
        infoBar.dataset.currentId = meta.id;
        document.getElementById('currentName').innerText = meta.name;
        document.getElementById('currentGroup').innerText = meta.group;
        document.getElementById('currentLogo').src = meta.logo || 'https://via.placeholder.com/64';

        if (meta.stream_type) {
            streamTypeBadge.innerText = meta.stream_type.toUpperCase();
            streamTypeBadge.style.display = 'inline-block';
            streamTypeBadge.className = `badge rounded-pill ${meta.stream_type === 'vod' ? 'bg-warning text-dark' : 'bg-info text-dark'} border-0 px-3 py-1 shadow-sm fw-bold`;
        } else {
            streamTypeBadge.style.display = 'none';
        }

        // Trigger Real-time Check
        fetchChannelStatus(meta.id);

        if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 30,
                maxMaxBufferLength: 60,
                enableWorker: true
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {
                    console.log("Autoplay blocked, user interaction required");
                });
                overlay.classList.add('d-none');
                
                // Hide native controls on mobile to avoid overlap, or at least try to move HUD
                if (window.innerWidth <= 768) {
                    video.removeAttribute('controls'); // Disable native controls if custom controls exist
                }
                
                const activeId = document.getElementById('channelInfo').dataset.currentId;
                updateStatusToLive(activeId);
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                 if (data.fatal) {
                     overlay.innerHTML = '<div class="text-danger"><i class="bi bi-exclamation-triangle display-4 mb-3"></i><h5>STREAM OFFLINE</h5></div>';
                 }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => {
                video.play();
                overlay.classList.add('d-none');
                
                const activeId = document.getElementById('channelInfo').dataset.currentId;
                updateStatusToLive(activeId);
            });
        }
    }

    // Search Logic
    const clearSearch = document.getElementById('clearSearch');
    const searchBtn = document.getElementById('searchBtn');

    let searchTimeout;
    function performSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentPage = 1;
            hasMore = true;
            lastGroup = null;
            channelList.innerHTML = '';
            fetchChannels(1);
        }, 300);
    }

    channelSearch.addEventListener('input', performSearch);
    searchBtn.addEventListener('click', performSearch);
    clearSearch.addEventListener('click', () => {
        channelSearch.value = '';
        performSearch();
    });

    // Smart HUD Control
    let hudTimeout;
    const infoBar = document.getElementById('channelInfo');
    
    function showHUD() {
        if (!infoBar.dataset.currentId) return; // Don't show if nothing playing
        infoBar.classList.remove('hud-hidden');
        infoBar.classList.add('hud-visible');
        topControls.classList.remove('opacity-0');
        clearTimeout(hudTimeout);
        hudTimeout = setTimeout(hideHUD, 2000);
    }
    
    function hideHUD() {
        if (infoBar.matches(':hover') || topControls.matches(':hover')) {
            hudTimeout = setTimeout(hideHUD, 1000);
            return;
        }
        infoBar.classList.remove('hud-visible');
        infoBar.classList.add('hud-hidden');
        topControls.classList.add('opacity-0');
    }
    
    playerArea.addEventListener('mousemove', showHUD);
    playerArea.addEventListener('touchstart', showHUD);
    playerArea.addEventListener('mouseleave', hideHUD);
    
    infoBar.addEventListener('mouseenter', () => {
        clearTimeout(hudTimeout);
        infoBar.classList.add('hud-visible');
        infoBar.classList.remove('hud-hidden');
    });

    // Custom Controls Logic
    const topControls = document.getElementById('topControls');
    const customPlayPause = document.getElementById('customPlayPause');
    const customMute = document.getElementById('customMute');
    
    video.addEventListener('play', () => {
        customPlayPause.innerHTML = '<i class="bi bi-pause-fill"></i>';
    });
    video.addEventListener('pause', () => {
        customPlayPause.innerHTML = '<i class="bi bi-play-fill"></i>';
    });
    video.addEventListener('volumechange', () => {
        if (video.muted || video.volume === 0) {
            customMute.innerHTML = '<i class="bi bi-volume-mute-fill"></i>';
        } else {
            customMute.innerHTML = '<i class="bi bi-volume-up-fill"></i>';
        }
    });
    
    customPlayPause.addEventListener('click', () => {
        if (video.paused) video.play();
        else video.pause();
    });
    
    customMute.addEventListener('click', () => {
        video.muted = !video.muted;
    });

    document.getElementById('vlcBtn').addEventListener('click', () => {
        const activeId = document.getElementById('channelInfo').dataset.currentId;
        if (!activeId) return;
        
        // 1. Attempt Server-side launch (for local usage)
        fetch(`/channels/play_vlc/${activeId}`, { method: 'POST' })
            .then(resp => resp.json())
            .then(data => {
                if (!data.success) {
                    // 2. Fallback: Browser-side launch (for mobile/remote)
                    const absUrl = new URL(currentStreamUrl, window.location.origin).href;
                    const vlcIntent = `intent://${absUrl.replace(/^https?:\/\//, '')}#Intent;scheme=http;type=video/*;package=org.videolan.vlc;end`;
                    const schemes = [vlcIntent, `vlc://${absUrl}`, `vnd.vlc://${absUrl}`];
                    
                    let index = 0;
                    function tryNext() {
                        if (index >= schemes.length) return;
                        const link = document.createElement('a');
                        link.href = schemes[index];
                        link.click();
                        index++;
                        setTimeout(tryNext, 500);
                    }
                    tryNext();
                }
            })
            .catch(err => {
                console.error("VLC remote launch failed:", err);
            });
    });


    // Initial Load
    playlistSelector.addEventListener('change', (e) => loadPlaylist(e.target.value, false));
    
    async function initPlayer() {
        if (initialChannelId) {
            try {
                const resp = await fetch(`/channels/api/channel/${initialChannelId}`);
                const data = await resp.json();
                if (data.status === 'ok') {
                    const plId = data.channel.playlist_id || playlistSelector.value;
                    playlistSelector.value = plId;
                    await loadPlaylist(plId, false);
                    playStream(data.channel.play_url, data.channel);
                    
                    // Highlight in list after a delay
                    setTimeout(() => {
                        const item = document.querySelector(`.channel-item[data-id="${initialChannelId}"]`);
                        if (item) item.classList.add('active');
                    }, 500);
                    return;
                }
            } catch (err) { console.error("Auto-load failed:", err); }
        }
        
        if (playlistSelector.value) {
            loadPlaylist(playlistSelector.value, true);
        }
    }

    initPlayer();
</script>
{% endblock %}
