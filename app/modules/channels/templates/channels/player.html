{% extends "base.html" %}

{% block content %}
<div class="player-container bg-black overflow-hidden position-relative" style="height: calc(100vh - 48px); margin: 0 !important; padding: 0 !important;">
    <!-- Background Blur Effect -->
    <div class="bg-blur position-absolute w-100 h-100" style="background: radial-gradient(circle at 20% 30%, rgba(13, 110, 253, 0.15) 0%, rgba(0,0,0,0) 70%); pointer-events: none;"></div>

    <div class="d-flex h-100 w-100 player-main-flex">
        <!-- Sidebar -->
        <div id="sidebar" class="glass-sidebar d-flex flex-column border-end border-white border-opacity-10 transition-all active" style="width: 320px; z-index: 1000;">
            <div class="p-3 mobile-sidebar-controls">
                <div class="d-flex align-items-center justify-content-between mb-3 desktop-only-header">
                    <h5 class="fw-bold mb-0 text-white shadow-sm">Channels</h5>
                    <button id="toggleSidebar" class="btn btn-link text-white p-0 opacity-75 hover-opacity-100 transition-all">
                        <i class="bi bi-layout-sidebar-inset fs-4"></i>
                    </button>
                </div>
                
                <div class="d-flex gap-1 mb-2 mobile-selectors-row">
                    <select id="playlistSelector" class="form-select form-select-sm bg-white bg-opacity-10 border-0 text-white shadow-none w-50" style="border-radius: 0.5rem; cursor: pointer; font-size: 0.75rem;">
                        {% for pl in playlists %}
                        <option value="{{ pl.id }}" class="bg-dark">{{ pl.name }}</option>
                        {% endfor %}
                    </select>
                    <select id="categorySelector" class="form-select form-select-sm bg-white bg-opacity-10 border-0 text-white shadow-none w-50" style="border-radius: 0.5rem; cursor: pointer; font-size: 0.75rem;">
                        <option value="" class="bg-dark">All Categories</option>
                    </select>
                </div>

                <div class="input-group input-group-sm">
                    <input type="text" id="channelSearch" class="form-control bg-white bg-opacity-10 border-0 text-white shadow-none" placeholder="Find channels..." style="border-radius: 0.5rem 0 0 0.5rem;">
                    <button class="btn btn-outline-secondary bg-white bg-opacity-10 border-0 text-white" type="button" id="clearSearch"><i class="bi bi-x"></i></button>
                    <button class="btn btn-primary border-0" type="button" id="searchBtn"><i class="bi bi-search"></i></button>
                </div>
            </div>
            
            <div id="channelList" class="flex-grow-1 overflow-auto custom-scrollbar px-3 pb-4">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="flex-grow-1 position-relative d-flex flex-column h-100 player-content-wrapper">
            <!-- Sidebar Re-open Button (Floating) -->
            <button id="openSidebar" class="btn btn-primary shadow-lg rounded-circle position-absolute top-50 start-0 translate-middle ms-4 d-none" style="z-index: 1001; width: 45px; height: 45px;">
                <i class="bi bi-chevron-right"></i>
            </button>

            <!-- Player Container -->
            <div id="playerArea" class="position-relative overflow-hidden bg-black transition-all flex-grow-1 d-flex flex-column align-items-center justify-content-center">
                <div id="videoContainer" class="w-100 h-100 position-relative d-none">
                    <video id="video" class="w-100 h-100" playsinline style="object-fit: contain;"></video>
                    
                    <!-- Custom Top Controls -->
                    <div id="topControls" class="position-absolute top-0 start-0 w-100 p-2 d-flex flex-column transition-all opacity-0" style="z-index: 1010; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);">
                        <div class="d-flex justify-content-between align-items-center w-100 mb-1">
                            <div class="d-flex gap-3">
                                <button id="customPlayPause" class="btn btn-link text-white p-0 fs-4"><i class="bi bi-pause-fill"></i></button>
                                <button id="customMute" class="btn btn-link text-white p-0 fs-4"><i class="bi bi-volume-up-fill"></i></button>
                                <button id="customFullscreen" class="btn btn-link text-white p-0 fs-4"><i class="bi bi-arrows-fullscreen"></i></button>
                            </div>
                            <div id="streamClock" class="text-white small fw-bold opacity-75">LIVE</div>
                        </div>
                        
                        <!-- VOD Seek Bar Integrated at Top -->
                        <div id="vodControl" class="w-100 d-none opacity-0 transition-all px-2 pb-2" style="pointer-events: none;">
                            <input type="range" id="seekBar" class="form-range w-100 mb-1 custom-range" value="0" step="0.1" style="pointer-events: auto;">
                            <div class="d-flex justify-content-between text-white-50 xx-small" style="pointer-events: none;">
                                <span id="currentTime">00:00</span>
                                <span id="duration">00:00</span>
                            </div>
                        </div>
                    </div>

                    <div id="playbackOverlay" class="position-absolute top-50 start-50 translate-middle text-center d-none" style="pointer-events: none; z-index: 1005;">
                        <div class="spinner-grow text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
                        <h5 class="fw-bold text-white letter-spacing-1" id="iptv-player-status">BUFFERING...</h5>
                    </div>
                </div>

                <div id="idleScreen" class="text-center p-5 scale-in">
                    <div class="display-1 text-primary opacity-50 mb-4 hvr-bounce-in"><i class="bi bi-play-circle-fill"></i></div>
                    <h2 class="fw-bold text-white mb-2">Ready to Watch</h2>
                    <p class="text-muted mb-0">Select a channel from the menu to start your stream.</p>
                </div>
            </div>

            <div id="channelInfo" class="p-5 glass-footer border-top border-white border-opacity-10 d-none">
                <div class="container-fluid px-0">
                    <div class="d-flex align-items-center gap-5 info-flex-container">
                        <div class="logo-wrapper position-relative">
                            <div class="logo-glow position-absolute w-100 h-100 blur-20 bg-primary opacity-50"></div>
                            <img id="currentLogo" src="" alt="" class="rounded-3 position-relative bg-white p-2 shadow-lg" style="height: 100px; width: 100px; object-fit: contain; border: 4px solid rgba(255,255,255,0.15);">
                        </div>
                        <div class="flex-grow-1 info-text-container">
                            <div class="d-flex align-items-center gap-2 mb-2 name-group-container flex-wrap">
                                <h1 id="currentName" class="mb-0 fw-bold text-white display-5"></h1>
                                <span id="currentGroup" class="badge rounded-pill bg-primary text-white border-0 px-3 py-1 shadow-sm" style="font-size: 0.85rem; letter-spacing: 1px;"></span>
                                <span id="streamTypeBadge" class="badge rounded-pill bg-info text-dark border-0 px-3 py-1 shadow-sm fw-bold" style="font-size: 0.75rem; display: none;">IPTV</span>
                            </div>
                            <div class="d-flex align-items-center gap-4 badges-container">
                                <span id="statusContainer" class="d-flex align-items-center gap-2 px-3 py-2 rounded-2 bg-success text-white fw-bold shadow-sm" style="font-size: 0.85rem; letter-spacing: 1px;">
                                    <i class="bi bi-broadcast"></i> <span id="statusLabel">LIVE</span>
                                </span>
                                <div class="d-flex align-items-center text-white gap-3 bg-white bg-opacity-10 px-4 py-2 rounded-pill shadow-inner tech-details-badge">
                                    <!-- Source Selector -->
                                    <div class="d-flex align-items-center me-2 border-end border-white border-opacity-10 pe-3">
                                        <i class="bi bi-hdd-network me-2 text-info"></i>
                                        <select id="sourceSelector" class="form-select form-select-sm bg-white bg-opacity-10 border-0 text-white shadow-none fw-bold" style="border-radius: 0.5rem; cursor: pointer; font-size: 0.75rem; width: 150px;">
                            <option value="default" class="bg-dark fw-bold">🚀 Smart Gateway</option>
                            <option value="none" class="bg-dark">🔗 Original Link</option>
                            <option value="tracking" class="bg-dark">📊 Web Tracking</option>
                            <option value="hls" class="bg-dark">⚡ HLS Proxy</option>
                            <option value="ts" class="bg-dark">📺 TS Proxy</option>
                        </select>
                                    </div>

                                    <span id="formatBadge" class="badge bg-white bg-opacity-25 text-white border-0 px-2 py-1" style="font-size: 0.65rem; min-width: 45px;">TYPE</span>
                                    <span class="small fw-bold border-end border-white border-opacity-25 pe-4 quality-span">
                                        <i class="bi bi-speedometer2 me-2"></i> <span id="qualityLabel">Checking...</span>
                                    </span>
                                    <span id="resBadge" class="fw-bold res-span" style="font-size: 0.85rem; letter-spacing: 2px;">SD</span>
                                    <span class="small text-white-50 border-start border-white border-opacity-25 ps-4 time-span">
                                        <i class="bi bi-clock me-1"></i> CONTINUOUS
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex gap-4 action-buttons-container">
                            <button id="vlcBtn" class="btn btn-outline-warning border-opacity-25 rounded-circle hvr-push shadow-lg action-btn" title="Play with VLC" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"><i class="bi bi-play-btn-fill"></i></button>
                            <button id="favBtn" class="btn btn-outline-light border-opacity-25 rounded-circle hvr-push shadow-lg action-btn" title="Add to Favorites" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"><i class="bi bi-heart-fill"></i></button>
                            <button id="shareBtn" class="btn btn-outline-light border-opacity-25 rounded-circle hvr-push shadow-lg action-btn" title="Share Channel" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"><i class="bi bi-share-fill"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="quickAddModal" class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-0 shadow-lg" style="border-radius: 1rem; backdrop-filter: blur(10px); background: rgba(30, 30, 30, 0.95) !important;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Add to Playlist</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label small text-white-50">Target Playlist</label>
                    <select id="qaPlaylist" class="form-select bg-dark border border-white border-opacity-10 text-white shadow-none" style="border-radius: 0.5rem;">
                        <option value="" class="bg-dark">Select Playlist...</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-white-50">Category (Group)</label>
                    <select id="qaGroup" class="form-select bg-dark border border-white border-opacity-10 text-white shadow-none" style="border-radius: 0.5rem;">
                        <option value="" class="bg-dark">Default/No Group</option>
                    </select>
                </div>
                <button id="qaConfirm" class="btn btn-primary w-100 fw-bold py-2" style="border-radius: 0.5rem;">CONFIRM ADD</button>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const sidebar = document.getElementById('sidebar');
    const playerArea = document.getElementById('playerArea');
    const videoContainer = document.getElementById('videoContainer');
    const idleScreen = document.getElementById('idleScreen');
    const playlistSelector = document.getElementById('playlistSelector');
    const categorySelector = document.getElementById('categorySelector');
    const channelList = document.getElementById('channelList');
    const channelSearch = document.getElementById('channelSearch');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const openSidebar = document.getElementById('openSidebar');
    const overlay = document.getElementById('playbackOverlay');
    const infoBar = document.getElementById('channelInfo');
    const streamTypeBadge = document.getElementById('streamTypeBadge');
    const vodControl = document.getElementById('vodControl');
    const seekBar = document.getElementById('seekBar');
    const currentTimeText = document.getElementById('currentTime');
    const durationText = document.getElementById('duration');
    const sourceSelector = document.getElementById('sourceSelector');
    const topControls = document.getElementById('topControls');
    const customPlayPause = document.getElementById('customPlayPause');
    const customMute = document.getElementById('customMute');
    const customFullscreen = document.getElementById('customFullscreen');
    let hls = null;
    let mpegtsPlayer = null;
    let allChannels = [];
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let currentPlaylistId = null;
    let currentCategory = "";
    let lastGroup = null;
    let currentStreamUrl = null;
    let currentStatusController = null;
    let fallbackTriggered = false;
    const initialChannelId = {{ initial_id | tojson | safe if initial_id else 'null' }};
    const userApiToken = "{{ current_user.api_token if current_user.is_authenticated else '' }}";
    let isMpegTS = false;
    let isHls = false;

    // Sidebar Toggling
    function toggleSidebarUI(show) {
        if (window.innerWidth <= 768) {
            const mOverlay = document.getElementById('mobileOverlay');
            if (show) {
                sidebar.classList.add('mobile-active');
                if (mOverlay) mOverlay.classList.add('active');
            } else {
                sidebar.classList.remove('mobile-active');
                if (mOverlay) mOverlay.classList.remove('active');
            }
        } else {
            if (show) {
                sidebar.classList.remove('collapsed');
                openSidebar.classList.add('d-none');
            } else {
                sidebar.classList.add('collapsed');
                openSidebar.classList.remove('d-none');
            }
        }
    }

    if (window.innerWidth <= 768) {
        // On mobile, ensure sidebar is visible and toggle buttons are hidden
        sidebar.classList.remove('collapsed');
        toggleSidebar.parentElement.classList.add('d-none');
        openSidebar.classList.add('d-none');
    }

    toggleSidebar.addEventListener('click', () => toggleSidebarUI(false));
    openSidebar.addEventListener('click', () => toggleSidebarUI(true));
    
    // Source Selector Hot-Switch
    sourceSelector.addEventListener('change', (e) => {
        const activeItem = document.querySelector('.channel-item.active');
        if (activeItem) {
            playStream(activeItem.dataset.url, activeItem, e.target.value);
        }
    });

    async function loadPlaylist(playlistId, autoPlayFirst = false) {
        currentPlaylistId = playlistId;
        currentPage = 1;
        hasMore = true;
        lastGroup = null;
        currentCategory = "";
        categorySelector.value = "";
        channelList.innerHTML = '';
        
        // Load Categories
        fetchCategories(playlistId);
        
        await fetchChannels(1, autoPlayFirst);
    }

    async function fetchCategories(playlistId) {
        try {
            const resp = await fetch(`/channels/web-player/categories/${playlistId}`);
            const data = await resp.json();
            if (data.status === 'ok') {
                let html = '<option value="" class="bg-dark">All Categories</option>';
                data.categories.forEach(cat => {
                    html += `<option value="${cat}" class="bg-dark">${cat}</option>`;
                });
                categorySelector.innerHTML = html;
            }
        } catch (err) { console.error(err); }
    }

    async function fetchChannels(page, autoPlayFirst = false) {
        if (isLoading || !hasMore) return;
        isLoading = true;
        
        const loader = document.createElement('div');
        loader.id = 'listLoader';
        loader.className = 'text-center py-3';
        loader.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div>';
        channelList.appendChild(loader);

        let url = `/channels/web-player/channels/${currentPlaylistId}?page=${page}&limit=100`;
        if (currentCategory) url += `&group=${encodeURIComponent(currentCategory)}`;
        const q = channelSearch.value.trim();
        if (q) url += `&q=${encodeURIComponent(q)}`;

        try {
            const resp = await fetch(url);
            const data = await resp.json();
            
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();

            if (data.status === 'ok') {
                renderChannels(data.channels);
                hasMore = data.has_more;
                currentPage = data.page;
                
                if (autoPlayFirst && page === 1 && data.channels.length > 0) {
                    const firstChannel = data.channels[0];
                    playStream(firstChannel.play_url, firstChannel);
                    setTimeout(() => {
                        const firstItem = document.querySelector('.channel-item');
                        if (firstItem) firstItem.classList.add('active');
                    }, 100);
                }
            }
        } catch (err) {
            console.error(err);
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();
        } finally {
            isLoading = false;
        }
    }

    async function fetchChannelStatus(id, retry = true) {
        if (!id || id === 'null') return; // Prevents 404
        
        if (currentStatusController) {
            currentStatusController.abort();
        }
        currentStatusController = new AbortController();
        const signal = currentStatusController.signal;

        try {
            const resp = await fetch(`/channels/check/${id}?ajax=1`, { 
                method: 'POST',
                signal: signal
            });
            const data = await resp.json();
            
            // Only update if it's still the active ID (handle string vs int)
            const activeId = infoBar.dataset.currentId;
            if (activeId != id) return;
            
            if (data.success) {
                // If live but no quality, retry once after 1s
                if (data.status === 'live' && (!data.quality || data.quality === 'N/A' || data.quality === 'null') && retry) {
                    setTimeout(() => fetchChannelStatus(id, false), 1000);
                }

                // Update Sidebar Item
                const item = document.querySelector(`.channel-item[data-id="${id}"]`);
                if (item) {
                    const dot = item.querySelector('span[style*="border-radius: 50%"]');
                    const text = item.querySelector('span.text-light');
                    const statusColor = data.status === 'live' ? '#2ecc71' : (data.status === 'die' ? '#e74c3c' : '#95a5a6');
                    if (dot) dot.style.backgroundColor = statusColor;
                    if (text) {
                        let info = [];
                        if (data.quality && data.quality !== 'N/A') info.push(data.quality);
                        if (data.resolution && data.resolution !== 'N/A') info.push(data.resolution);
                        text.innerText = info.join(' • ');
                    }
                }

                // Update Bottom Bar
                if (infoBar.dataset.currentId == id) {
                    infoBar.dataset.status = data.status; // STORE STATUS
                    const statusContainer = document.getElementById('statusContainer');
                    const statusLabel = document.getElementById('statusLabel');
                    if (statusContainer) {
                        statusContainer.className = `d-flex align-items-center gap-2 px-3 py-2 rounded-2 ${data.status === 'live' ? 'bg-success' : 'bg-danger'} text-white fw-bold shadow-sm`;
                    }
                    if (statusLabel) statusLabel.innerText = data.status.toUpperCase();
                    if (data.status === 'die') {
                        // CRITICAL: Only show OFFLINE if video is NOT playing
                        if (video.paused || video.readyState < 2) {
                            overlay.classList.remove('d-none');
                            overlay.innerHTML = '<div class="text-danger"><i class="bi bi-exclamation-triangle display-4 mb-3"></i><h5>STREAM OFFLINE</h5><p class="small opacity-75">This channel is currently down.</p></div>';
                        }
                    }

                    const qualityLabel = document.getElementById('qualityLabel');
                    if (qualityLabel) {
                        const q = data.quality && data.quality !== 'N/A' ? data.quality.toUpperCase() : '';
                        qualityLabel.innerText = q ? `${q} • ${data.latency}MS` : `${data.latency}MS`;
                        if (!q && !data.latency) qualityLabel.innerText = 'LIVE';
                        qualityLabel.parentElement.classList.remove('d-none');
                    }
                    
                    const resBadge = document.getElementById('resBadge');
                    if (resBadge) {
                        resBadge.innerText = data.resolution || 'SD';
                        if (resBadge.innerText.includes('1920x1080')) resBadge.innerText = 'FHD 1080P';
                        else if (resBadge.innerText.includes('3840x2160')) resBadge.innerText = 'ULTRA HD 4K';
                        else if (resBadge.innerText.includes('1280x720')) resBadge.innerText = 'HD 720P';
                    }
                }
            }
        } catch (err) { 
            if (err.name === 'AbortError') return;
            console.error("Check failed:", err); 
        }
    }


    function formatTime(seconds) {
        if (!seconds) return "00:00";
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) return `${h}:${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
    }
    function playStream(url, metaInput = {}, forcedType = null) {
        const meta = metaInput && metaInput.dataset ? {...metaInput.dataset} : (typeof metaInput === 'string' ? {name: metaInput} : {...metaInput});
        const sId = meta.id || meta.id_ || '';
        const sName = meta.name || '';
        const sType = meta.stream_type || meta.streamType || 'live';
        
        forcedType = forcedType || sourceSelector.value;
        currentStreamUrl = url;
        
        // Immediate UI Reset
        idleScreen.classList.add('d-none');
        videoContainer.classList.remove('d-none');
        infoBar.classList.remove('d-none');
        
        // Reset Overlay to default spinner state
        overlay.innerHTML = `
            <div class="spinner-grow text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
            <h5 class="fw-bold text-white letter-spacing-1" id="iptv-player-status">CONNECTING...</h5>
        `;
        overlay.classList.remove('d-none');
        
        // Update Info Bar & Persist Metadata for Recovery
        infoBar.dataset.currentId = sId;
        infoBar.dataset.name = sName;
        infoBar.dataset.group = meta.group || 'General';
        infoBar.dataset.logo = meta.logo || '';
        infoBar.dataset.streamType = meta.streamType || '';
        
        document.getElementById('currentName').textContent = sName;
        document.getElementById('currentGroup').textContent = meta.group || 'General';
        document.getElementById('currentLogo').src = meta.logo || 'https://via.placeholder.com/100';
        
        // Use Global Engine
        window.IPTVPlayer.play(video, {
            id: sId,
            url: url,
            name: sName,
            stream_type: sType,
            forcedType: forcedType,
            token: userApiToken,
            overlay: document.getElementById('playbackOverlay'),
            statusLabel: document.getElementById('iptv-player-status')
        });

        // Toggle VOD Controls - Sync with engine detection
        const isVod = sType === 'vod' || ['.mp4', '.mkv', '.mov', '.avi', '.wmv', '.flv', '/movie/'].some(ext => url.toLowerCase().includes(ext));
        if (isVod) {
            vodControl.classList.remove('d-none');
            // Small delay to ensure it's removed from DOM flow before opacity change
            setTimeout(() => vodControl.classList.remove('opacity-0'), 50);
            if (document.getElementById('statusLabel')) document.getElementById('statusLabel').innerText = 'VOD';
            if (document.getElementById('streamClock')) document.getElementById('streamClock').innerText = 'MOVIE/VOD';
        } else {
            vodControl.classList.add('d-none');
            vodControl.classList.add('opacity-0');
            if (document.getElementById('statusLabel')) document.getElementById('statusLabel').innerText = 'LIVE';
            if (document.getElementById('streamClock')) document.getElementById('streamClock').innerText = 'LIVE';
        }

        // Update technical badges and fetch health status
        isHls = url.toLowerCase().includes('.m3u8') || forcedType === 'hls';
        isMpegTS = url.toLowerCase().includes('.ts') || forcedType === 'ts' || (forcedType === 'default' && !isHls);
        updateFormatBadge(url, isHls, isMpegTS, sType, sId);
        
        // Update URL for browser history if needed
        if (sId) {
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('id', sId);
            window.history.replaceState({}, '', newUrl);
        }
    }
    
    function updateFormatBadge(url, isHls, isMpegTS, sType, sId) {
        const formatBadge = document.getElementById('formatBadge');
        if (formatBadge) {
            let detectUrl = url || "";
            let extension = detectUrl.split('?')[0].split('.').pop().toUpperCase();
            if (extension.length > 5 || extension.includes('/') || extension === 'PLAY' || !isNaN(extension)) {
                if (isHls) extension = 'HLS';
                else if (isMpegTS) extension = 'TS';
                else extension = 'LINK';
            }
            if (extension === 'M3U8') extension = 'HLS';
            formatBadge.innerText = extension;
            
            if (extension === 'HLS') formatBadge.className = 'badge bg-primary text-white';
            else if (extension === 'TS') formatBadge.className = 'badge bg-warning text-dark';
            else if (['MP4', 'MKV', 'AVI', 'MOV'].includes(extension)) formatBadge.className = 'badge bg-success text-white';
            else formatBadge.className = 'badge bg-secondary text-white';
        }

        if (sType) {
            streamTypeBadge.innerText = sType.toUpperCase();
            streamTypeBadge.style.display = 'inline-block';
            streamTypeBadge.className = `badge rounded-pill ${sType === 'vod' ? 'bg-warning text-dark' : 'bg-info text-dark'} border-0 px-3 py-1 shadow-sm fw-bold`;
        } else {
            streamTypeBadge.style.display = 'none';
        }
        if (typeof fetchChannelStatus === 'function') {
            fetchChannelStatus(sId);
        }
    }

            const txt = statusLabel.innerText.toUpperCase();
            if (txt.includes('CONNECTING') || txt.includes('BUFFERING') || txt.includes('ERROR') || txt.includes('RECONNECTING')) {

        if (infoBar.matches(':hover') || topControls.matches(':hover') || vodControl.matches(':hover')) {

        fetch(`/channels/play_vlc/${activeId}`, { method: 'POST' })
            .then(resp => resp.json())
            .then(data => {
                if (!data.success) {
                    // 2. Fallback: Browser-side launch (for mobile/remote)
                    const absUrl = new URL(currentStreamUrl, window.location.origin).href;
                    const vlcIntent = `intent://${absUrl.replace(/^https?:\/\//, '')}#Intent;scheme=http;type=video/*;package=org.videolan.vlc;end`;
                    const schemes = [vlcIntent, `vlc://${absUrl}`, `vnd.vlc://${absUrl}`];
                    
                    let index = 0;
                    function tryNext() {
                        if (index >= schemes.length) return;
                        const link = document.createElement('a');
                        link.href = schemes[index];
                        link.click();
                        index++;
                        setTimeout(tryNext, 500);
                    }
                    tryNext();

            })
            .catch(err => {

        const formatBadge = document.getElementById('formatBadge');
        const isLiveTS = formatBadge && formatBadge.innerText === 'TS' && (!video.duration || video.duration === Infinity);

        stuckTimer = setTimeout(() => {
            if (video.paused || video.readyState < 3) { // 3 = HAVE_FUTURE_DATA
                if (isLiveTS) {
                    console.log("Live TS stream stuck, performing full REFRESH...");
                    // Use persisted metadata
                    playStream(currentStreamUrl, infoBar);
                } else {
                    console.log("Stream stuck, attempting auto-resume...");
                    if (video.currentTime > 0) video.currentTime += 0.1;
                    video.play().catch(() => {});
                }
            }
        }, isLiveTS ? 8000 : 5000); // Wait 8s for TS, 5s for others
    });

    });

        // Note: isMpegTS and currentStreamUrl are accessible here if globally defined
        if (typeof isMpegTS !== 'undefined' && isMpegTS && !video.ended) {

    }

    function renderQAPlaylists() {
        let html = '<option value="" class="bg-dark">Select Playlist...</option>';
        playlistsCache.forEach(pl => {
            html += `<option value="${pl.id}" class="bg-dark">${pl.name}</option>`;
        });
        qaPlaylistSelect.innerHTML = html;
        qaGroupSelect.innerHTML = '<option value="" class="bg-dark">Default/No Group</option>';
    }

    qaPlaylistSelect.addEventListener('change', () => {
        const plId = qaPlaylistSelect.value;
        if (!plId) {
            qaGroupSelect.innerHTML = '<option value="" class="bg-dark">Default/No Group</option>';
            return;
        }
        
        const pl = playlistsCache.find(p => p.id == plId);
        if (pl && pl.groups) {
            let html = '<option value="" class="bg-dark">Default/No Group</option>';
            pl.groups.forEach(g => {
                html += `<option value="${g.id}" class="bg-dark">${g.name}</option>`;
            });
            qaGroupSelect.innerHTML = html;
        }
    });

    qaConfirmBtn.addEventListener('click', async () => {
        const plId = qaPlaylistSelect.value;
        const gId = qaGroupSelect.value;
        
        if (!plId) return alert('Please select a playlist');
        
        qaConfirmBtn.disabled = true;
        qaConfirmBtn.innerText = 'ADDING...';
        
        try {
            const resp = await fetch('/channels/api/quick_add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    channel_id: qaChannelId,
                    playlist_id: plId,
                    group_id: gId
                })
            });
            const data = await resp.json();
            if (data.status === 'ok') {
                qaModal.hide();
                alert('Channel added successfully!');
            } else {
                alert('Error: ' + data.message);
            }
        } catch (err) { alert('Request failed'); }
        finally {
            qaConfirmBtn.disabled = false;
            qaConfirmBtn.innerText = 'CONFIRM ADD';
        }
    });

    initPlayer();
</script>
{% endblock %}
