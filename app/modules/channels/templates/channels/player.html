{% extends "base.html" %}

{% block content %}
<div class="player-container bg-black overflow-hidden position-relative" style="height: calc(100vh - 56px); margin-top: -32px;">
    <!-- Background Blur Effect -->
    <div class="bg-blur position-absolute w-100 h-100" style="background: radial-gradient(circle at 20% 30%, rgba(13, 110, 253, 0.15) 0%, rgba(0,0,0,0) 70%); pointer-events: none;"></div>

    <div id="mobileOverlay" class="mobile-overlay"></div>
    <div class="d-flex h-100 w-100 position-relative">
        <!-- Sidebar -->
        <div id="sidebar" class="glass-sidebar d-flex flex-column border-end border-white border-opacity-10 transition-all active" style="width: 320px; z-index: 1000;">
            <div class="p-4 flex-shrink-0">
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <h5 class="fw-bold mb-0 text-white shadow-sm">Channels</h5>
                    <button id="toggleSidebar" class="btn btn-link text-white p-0 opacity-75 hover-opacity-100 transition-all">
                        <i class="bi bi-layout-sidebar-inset fs-4"></i>
                    </button>
                </div>
                
                <div class="row g-2 mb-3">
                    <div class="col-12">
                        <label class="small text-muted text-uppercase fw-bold mb-1 ps-1" style="font-size: 0.65rem;">Source</label>
                        <select id="playlistSelector" class="form-select form-select-sm bg-white bg-opacity-10 border-0 text-white shadow-none" style="border-radius: 0.5rem; cursor: pointer;">
                            {% for pl in playlists %}
                            <option value="{{ pl.id }}" class="bg-dark">{{ pl.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="small text-muted text-uppercase fw-bold mb-1 ps-1" style="font-size: 0.65rem;">Category</label>
                        <select id="categorySelector" class="form-select form-select-sm bg-white bg-opacity-10 border-0 text-white shadow-none" style="border-radius: 0.5rem; cursor: pointer;">
                            <option value="" class="bg-dark">All Categories</option>
                        </select>
                    </div>
                </div>

                <div class="position-relative">
                    <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                    <input type="text" id="channelSearch" class="form-control bg-white bg-opacity-10 border-0 text-white ps-5 shadow-none py-2" placeholder="Find channels..." style="border-radius: 0.75rem;">
                </div>
            </div>
            
            <div id="channelList" class="flex-grow-1 overflow-auto custom-scrollbar px-3 pb-4">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="flex-grow-1 position-relative d-flex flex-column h-100">
            <!-- Sidebar Re-open Button (Floating) -->
            <button id="openSidebar" class="btn btn-primary shadow-lg rounded-circle position-absolute top-50 start-0 translate-middle ms-4 d-none" style="z-index: 1001; width: 45px; height: 45px;">
                <i class="bi bi-chevron-right"></i>
            </button>

            <!-- Player Container -->
            <div id="playerArea" class="flex-grow-1 bg-black d-flex flex-column align-items-center justify-content-center">
                <div id="videoContainer" class="w-100 h-100 position-relative d-none">
                    <video id="video" class="w-100 h-100" controls crossorigin playsinline style="object-fit: contain;"></video>
                    
                    <div id="playbackOverlay" class="position-absolute top-50 start-50 translate-middle text-center d-none">
                        <div class="spinner-grow text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
                        <h5 class="fw-bold text-white letter-spacing-1">BUFFERING...</h5>
                    </div>
                </div>

                <div id="idleScreen" class="text-center p-5 scale-in">
                    <div class="display-1 text-primary opacity-50 mb-4 hvr-bounce-in"><i class="bi bi-play-circle-fill"></i></div>
                    <h2 class="fw-bold text-white mb-2">Ready to Watch</h2>
                    <p class="text-muted mb-0">Select a channel from the menu to start your stream.</p>
                </div>
            </div>

            <div id="channelInfo" class="p-5 glass-footer border-top border-white border-opacity-10 d-none" style="min-height: 180px;">
                <div class="container-fluid">
                    <div class="d-flex align-items-center gap-5">
                        <div class="position-relative">
                            <div class="logo-glow position-absolute w-100 h-100 blur-20 bg-primary opacity-50"></div>
                            <img id="currentLogo" src="" alt="" class="rounded-3 position-relative bg-white p-2 shadow-lg" style="height: 100px; width: 100px; object-fit: contain; border: 4px solid rgba(255,255,255,0.15);">
                        </div>
                        <div class="flex-grow-1">
                            <div class="d-flex align-items-baseline gap-4 mb-2">
                                <h1 id="currentName" class="mb-0 fw-bold text-white display-5"></h1>
                                <span id="currentGroup" class="badge rounded-pill bg-primary text-white border-0 px-4 py-2 shadow-sm" style="font-size: 1rem; letter-spacing: 1px;"></span>
                            </div>
                            <div class="d-flex align-items-center gap-4">
                                <span id="statusContainer" class="d-flex align-items-center gap-2 px-3 py-2 rounded-2 bg-success text-white fw-bold shadow-sm" style="font-size: 0.85rem; letter-spacing: 1px;">
                                    <i class="bi bi-broadcast"></i> <span id="statusLabel">LIVE</span>
                                </span>
                                <div class="d-flex align-items-center text-white gap-4 bg-white bg-opacity-10 px-4 py-2 rounded-pill shadow-inner">
                                    <span class="small fw-bold border-end border-white border-opacity-25 pe-4">
                                        <i class="bi bi-speedometer2 me-2"></i> <span id="qualityLabel">Checking...</span>
                                    </span>
                                    <span id="resBadge" class="fw-bold" style="font-size: 0.85rem; letter-spacing: 2px;">SD</span>
                                    <span class="small text-white-50 border-start border-white border-opacity-25 ps-4">
                                        <i class="bi bi-clock me-1"></i> CONTINUOUS
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex gap-4">
                            <button class="btn btn-outline-light border-opacity-25 rounded-circle hvr-push shadow-lg" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"><i class="bi bi-heart-fill"></i></button>
                            <button class="btn btn-outline-light border-opacity-25 rounded-circle hvr-push shadow-lg" style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"><i class="bi bi-share-fill"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Premium Theming */
    .glass-sidebar {
        background: rgba(18, 18, 18, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }
    .glass-footer {
        background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 50%, rgba(0,0,0,0) 100%);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 1005;
    }
    
    .hud-hidden {
        opacity: 0 !important;
        transform: translateY(20px);
        pointer-events: none;
    }
    
    .hud-visible {
        opacity: 1 !important;
        transform: translateY(0);
        pointer-events: auto;
    }
    
    .shadow-inner { box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
    
    .transition-all { transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .letter-spacing-1 { letter-spacing: 2px; }
    .blur-20 { filter: blur(20px); }
    
    @media (max-width: 768px) {
        #sidebar {
            position: fixed;
            left: -100%;
            width: 85%;
            height: 100vh;
            z-index: 1050;
            margin-left: 0 !important;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        #sidebar.mobile-active {
            left: 0;
        }
        #sidebar.collapsed {
            margin-left: 0 !important;
            left: -100%;
        }
        .main-workspace {
            width: 100%;
        }
        .glass-footer {
            padding: 1.5rem !important;
            min-height: auto !important;
        }
        .glass-footer .d-flex.align-items-center.gap-5 {
            flex-direction: column;
            gap: 1.5rem !important;
            align-items: flex-start !important;
        }
        #currentLogo {
            height: 64px !important;
            width: 64px !important;
        }
        #currentName {
            font-size: 1.5rem !important;
        }
        .mobile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1040;
            display: none;
            backdrop-filter: blur(5px);
        }
        .mobile-overlay.active {
            display: block;
        }
    }
    
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(13, 110, 253, 0.5); }

    .group-header {
        position: sticky;
        top: 0;
        z-index: 5;
        background: rgba(18, 18, 18, 0.9);
        backdrop-filter: blur(5px);
        padding: 1rem 0.5rem 0.5rem;
        margin-top: 0.5rem;
    }

    .channel-item {
        border-left: 3px solid transparent;
        border-radius: 0.75rem;
        margin-bottom: 0.25rem;
        background: rgba(255,255,255,0.02);
        cursor: pointer;
    }
    .channel-item:hover {
        background: rgba(255, 255, 255, 0.06);
        transform: translateX(4px);
    }
    .channel-item.active {
        background: linear-gradient(90deg, rgba(13, 110, 253, 0.2) 0%, rgba(13, 110, 253, 0.05) 100%);
        border-left: 3px solid #0d6efd;
    }
    
    .logo-container {
        width: 44px;
        height: 44px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.6rem;
        padding: 4px;
        flex-shrink: 0;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .hover-opacity-100:hover { opacity: 1 !important; }
    
    .scale-in {
        animation: scaleIn 0.5s ease-out;
    }
    @keyframes scaleIn {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('video');
    const sidebar = document.getElementById('sidebar');
    const playerArea = document.getElementById('playerArea');
    const videoContainer = document.getElementById('videoContainer');
    const idleScreen = document.getElementById('idleScreen');
    const playlistSelector = document.getElementById('playlistSelector');
    const categorySelector = document.getElementById('categorySelector');
    const channelList = document.getElementById('channelList');
    const channelSearch = document.getElementById('channelSearch');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const openSidebar = document.getElementById('openSidebar');
    const overlay = document.getElementById('playbackOverlay');
    
    let hls = null;
    let allChannels = [];
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let currentPlaylistId = null;
    let currentCategory = "";
    let lastGroup = null;

    // Sidebar Toggling
    function toggleSidebarUI(show) {
        if (window.innerWidth <= 768) {
            if (show) {
                sidebar.classList.add('mobile-active');
                document.getElementById('mobileOverlay').classList.add('active');
            } else {
                sidebar.classList.remove('mobile-active');
                document.getElementById('mobileOverlay').classList.remove('active');
            }
        } else {
            if (show) {
                sidebar.classList.remove('collapsed');
                openSidebar.classList.add('d-none');
            } else {
                sidebar.classList.add('collapsed');
                openSidebar.classList.remove('d-none');
            }
        }
    }

    toggleSidebar.addEventListener('click', () => toggleSidebarUI(false));
    openSidebar.addEventListener('click', () => toggleSidebarUI(true));
    document.getElementById('mobileOverlay').addEventListener('click', () => toggleSidebarUI(false));

    async function loadPlaylist(playlistId, autoPlayFirst = false) {
        currentPlaylistId = playlistId;
        currentPage = 1;
        hasMore = true;
        lastGroup = null;
        currentCategory = "";
        categorySelector.value = "";
        channelList.innerHTML = '';
        
        // Load Categories
        fetchCategories(playlistId);
        
        await fetchChannels(1, autoPlayFirst);
    }

    async function fetchCategories(playlistId) {
        try {
            const resp = await fetch(`/channels/web-player/categories/${playlistId}`);
            const data = await resp.json();
            if (data.status === 'ok') {
                let html = '<option value="" class="bg-dark">All Categories</option>';
                data.categories.forEach(cat => {
                    html += `<option value="${cat}" class="bg-dark">${cat}</option>`;
                });
                categorySelector.innerHTML = html;
            }
        } catch (err) { console.error(err); }
    }

    async function fetchChannels(page, autoPlayFirst = false) {
        if (isLoading || !hasMore) return;
        isLoading = true;
        
        const loader = document.createElement('div');
        loader.id = 'listLoader';
        loader.className = 'text-center py-3';
        loader.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div>';
        channelList.appendChild(loader);

        let url = `/channels/web-player/channels/${currentPlaylistId}?page=${page}&limit=100`;
        if (currentCategory) url += `&group=${encodeURIComponent(currentCategory)}`;

        try {
            const resp = await fetch(url);
            const data = await resp.json();
            
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();

            if (data.status === 'ok') {
                renderChannels(data.channels);
                hasMore = data.has_more;
                currentPage = data.page;
                
                if (autoPlayFirst && page === 1 && data.channels.length > 0) {
                    const firstChannel = data.channels[0];
                    playStream(firstChannel.play_url, firstChannel);
                    setTimeout(() => {
                        const firstItem = document.querySelector('.channel-item');
                        if (firstItem) firstItem.classList.add('active');
                    }, 100);
                }
            }
        } catch (err) {
            console.error(err);
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();
        } finally {
            isLoading = false;
        }
    }

    function renderChannels(channels) {
        let html = '';
        channels.forEach(ch => {
            if (ch.group !== lastGroup) {
                html += `<div class="group-header text-muted text-uppercase fw-bold letter-spacing-1 small mb-2">${ch.group}</div>`;
                lastGroup = ch.group;
            }
            
            const statusColor = ch.status === 'live' ? '#2ecc71' : (ch.status === 'die' ? '#e74c3c' : '#95a5a6');
            
            html += `
                <div class="channel-item p-2 d-flex align-items-center gap-3 transition-all" 
                     data-id="${ch.id}" data-url="${ch.play_url}" data-name="${ch.name}" data-logo="${ch.logo}" data-group="${ch.group}">
                    <div class="logo-container">
                        <img src="${ch.logo || 'https://via.placeholder.com/40'}" class="w-100 h-100" style="object-fit: contain;">
                    </div>
                    <div class="flex-grow-1 overflow-hidden">
                        <div class="text-white text-truncate fw-medium" style="font-size: 0.95rem;">${ch.name}</div>
                        <div class="d-flex align-items-center gap-2 mt-1">
                            <span style="width: 8px; height: 8px; border-radius: 50%; background-color: ${statusColor};" title="${ch.status}"></span>
                            <span class="text-light text-truncate" style="font-size: 0.75rem;">
                                ${ch.quality} • ${ch.resolution}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        });
        
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        while (tempDiv.firstChild) {
            const child = tempDiv.firstChild;
            if (child.classList && child.classList.contains('channel-item')) {
                child.addEventListener('click', () => {
                    document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
                    child.classList.add('active');
                    playStream(child.dataset.url, child.dataset);
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('mobile-active');
                        mobileOverlay.classList.remove('active');
                    }
                });
            }
            channelList.appendChild(child);
        }
    }

    // Category Selector
    categorySelector.addEventListener('change', (e) => {
        currentCategory = e.target.value;
        currentPage = 1;
        hasMore = true;
        lastGroup = null;
        channelList.innerHTML = '';
        fetchChannels(1, false);
    });

    // Scroll Listener
    channelList.addEventListener('scroll', () => {
        if (channelList.scrollTop + channelList.offsetHeight >= channelList.scrollHeight - 300) {
            if (!isLoading && hasMore) {
                fetchChannels(currentPage + 1);
            }
        }
    });

    async function fetchChannelStatus(id, retry = true) {
        try {
            const resp = await fetch(`/channels/check/${id}?ajax=1`, { method: 'POST' });
            const data = await resp.json();
            if (data.success) {
                // If live but no quality, retry once after 1s
                if (data.status === 'live' && (!data.quality || data.quality === 'N/A' || data.quality === 'null') && retry) {
                    setTimeout(() => fetchChannelStatus(id, false), 1000);
                }

                // Update Sidebar Item
                const item = document.querySelector(`.channel-item[data-id="${id}"]`);
                if (item) {
                    const dot = item.querySelector('span[style*="border-radius: 50%"]');
                    const text = item.querySelector('span.text-light');
                    const statusColor = data.status === 'live' ? '#2ecc71' : (data.status === 'die' ? '#e74c3c' : '#95a5a6');
                    if (dot) dot.style.backgroundColor = statusColor;
                    if (text) text.innerText = `${data.quality || 'N/A'} • ${data.resolution || 'SD'}`;
                }

                // Update Bottom Bar
                const infoBar = document.getElementById('channelInfo');
                if (infoBar.dataset.currentId == id) {
                    const statusContainer = document.getElementById('statusContainer');
                    const statusLabel = document.getElementById('statusLabel');
                    if (statusContainer) {
                        statusContainer.className = `d-flex align-items-center gap-2 px-3 py-2 rounded-2 ${data.status === 'live' ? 'bg-success' : 'bg-danger'} text-white fw-bold shadow-sm`;
                    }
                    if (statusLabel) statusLabel.innerText = data.status.toUpperCase();

                    const qualityLabel = document.getElementById('qualityLabel');
                    if (qualityLabel) {
                        qualityLabel.innerText = `${data.quality ? data.quality.toUpperCase() : 'N/A'} • ${data.latency}MS`;
                    }
                    
                    const resBadge = document.getElementById('resBadge');
                    if (resBadge) {
                        resBadge.innerText = data.resolution || 'SD';
                        if (resBadge.innerText.includes('1920x1080')) resBadge.innerText = 'FHD 1080P';
                        else if (resBadge.innerText.includes('3840x2160')) resBadge.innerText = 'ULTRA HD 4K';
                        else if (resBadge.innerText.includes('1280x720')) resBadge.innerText = 'HD 720P';
                    }
                }
            }
        } catch (err) { console.error("Check failed:", err); }
    }

    function playStream(url, meta) {
        if (hls) hls.destroy();
        
        idleScreen.classList.add('d-none');
        videoContainer.classList.remove('d-none');
        overlay.classList.remove('d-none');
        
        // Update Info
        const infoBar = document.getElementById('channelInfo');
        infoBar.classList.remove('d-none');
        infoBar.dataset.currentId = meta.id;
        document.getElementById('currentName').innerText = meta.name;
        document.getElementById('currentGroup').innerText = meta.group;
        document.getElementById('currentLogo').src = meta.logo || 'https://via.placeholder.com/64';

        // Trigger Real-time Check
        fetchChannelStatus(meta.id);

        if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 30,
                maxMaxBufferLength: 60,
                enableWorker: true
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {
                    console.log("Autoplay blocked, user interaction required");
                });
                overlay.classList.add('d-none');
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                 if (data.fatal) {
                     overlay.innerHTML = '<div class="text-danger"><i class="bi bi-exclamation-triangle display-4 mb-3"></i><h5>STREAM OFFLINE</h5></div>';
                 }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => {
                video.play();
                overlay.classList.add('d-none');
            });
        }
    }

    // Search Logic
    channelSearch.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('.channel-item').forEach(item => {
            const text = item.innerText.toLowerCase();
            item.classList.toggle('d-none', !text.includes(q));
        });
    });

    // Smart HUD Control
    let hudTimeout;
    const infoBar = document.getElementById('channelInfo');
    
    function showHUD() {
        if (!infoBar.dataset.currentId) return; // Don't show if nothing playing
        infoBar.classList.remove('hud-hidden');
        infoBar.classList.add('hud-visible');
        clearTimeout(hudTimeout);
        hudTimeout = setTimeout(hideHUD, 3000);
    }
    
    function hideHUD() {
        if (infoBar.matches(':hover')) {
            hudTimeout = setTimeout(hideHUD, 1000);
            return;
        }
        infoBar.classList.remove('hud-visible');
        infoBar.classList.add('hud-hidden');
    }
    
    playerArea.addEventListener('mousemove', showHUD);
    infoBar.addEventListener('mouseenter', () => {
        clearTimeout(hudTimeout);
        infoBar.classList.add('hud-visible');
        infoBar.classList.remove('hud-hidden');
    });

    // Initial Load
    playlistSelector.addEventListener('change', (e) => loadPlaylist(e.target.value, false));
    if (playlistSelector.value) {
        loadPlaylist(playlistSelector.value, true);
    }
</script>
{% endblock %}
