{% extends "base.html" %}

{% block content %}
<div class="fixed inset-0 bg-[#020617] overflow-hidden flex flex-col pt-[48px]">
    <!-- Main Content Container (Sidebar + Player) -->
    <div class="flex-grow flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Premium Sidebar -->
        <div id="sidebar" class="w-full md:w-[320px] shrink-0 glass-panel !rounded-none border-y-0 border-l-0 border-white/5 flex flex-col transition-all duration-500 z-30 overflow-hidden active">
            <!-- Sidebar Header & Search -->
            <div class="p-4 space-y-4 border-b border-white/5 bg-white/[0.02]">
                <div class="flex items-center justify-between">
                    <h5 class="text-[10px] font-black text-white/40 uppercase tracking-[2px]">Channel Library</h5>
                    <button id="toggleSidebar" class="md:block hidden text-white/20 hover:text-white transition-colors">
                        <i class="bi bi-layout-sidebar-inset text-lg"></i>
                    </button>
                    <button id="closeSidebarMobile" class="md:hidden text-white/40" onclick="toggleSidebarUI(false)">
                        <i class="bi bi-x-circle text-xl"></i>
                    </button>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <select id="playlistSelector" class="glass-control !py-1.5 !text-[10px] bg-slate-900/40">
                        {% for pl in playlists %}
                        <option value="{{ pl.id }}">{{ pl.name }}</option>
                        {% endfor %}
                    </select>
                    <select id="categorySelector" class="glass-control !py-1.5 !text-[10px] bg-slate-900/40">
                        <option value="">All Categories</option>
                    </select>
                </div>

                <div class="relative group">
                    <i class="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="text" id="channelSearch" class="glass-control !pl-10 !py-2 !text-xs bg-slate-950/20" placeholder="Find channels...">
                    <button id="clearSearch" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/10 hover:text-white hidden"><i class="bi bi-x-lg"></i></button>
                </div>
            </div>
            
            <!-- List Content -->
            <div id="channelList" class="flex-grow overflow-y-auto custom-scrollbar p-2 space-y-1">
                <!-- Skeleton / Initial state -->
                <div class="py-12 text-center animate-pulse">
                    <div class="w-10 h-10 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
                    <span class="text-[10px] font-black text-white/20 uppercase tracking-widest">Synchronizing...</span>
                </div>
            </div>
        </div>

        <!-- Main Workspace (Player Area) -->
        <div class="flex-grow relative flex flex-col bg-black overflow-hidden">
            <!-- Floating Sidebar Trigger -->
            <button id="openSidebar" class="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-blue-600 shadow-2xl shadow-blue-600/20 text-white hidden z-[35] animate-in slide-in-from-left-4">
                <i class="bi bi-chevron-right"></i>
            </button>

            <!-- Video Context Area -->
            <div id="playerArea" class="flex-grow relative flex items-center justify-center group overflow-hidden">
                <!-- Video Element Layer -->
                <div id="videoContainer" class="absolute inset-0 hidden">
                    <video id="video" class="w-full h-full object-contain" playsinline></video>
                    
                    <!-- Top HUD Controls (Auto-hide) -->
                    <div id="topControls" class="absolute top-0 left-0 right-0 p-6 pt-8 bg-gradient-to-b from-black/80 via-black/20 to-transparent opacity-0 transition-opacity duration-500 z-40 pointer-events-none group-hover:pointer-events-auto">
                        <div class="flex items-center justify-between max-w-7xl mx-auto">
                            <div class="flex items-center gap-6">
                                <button id="customPlayPause" class="text-white hover:text-blue-400 text-2xl transition-all"><i class="bi bi-pause-fill"></i></button>
                                <button id="customMute" class="text-white hover:text-blue-400 text-2xl transition-all"><i class="bi bi-volume-up-fill"></i></button>
                            </div>
                            <div class="flex items-center gap-4">
                                <div id="streamClock" class="text-[10px] font-black text-white/40 uppercase tracking-[3px]">LIVE ENCRYPTED</div>
                                <button id="customFullscreen" class="text-white hover:text-blue-400 text-xl transition-all"><i class="bi bi-arrows-fullscreen"></i></button>
                            </div>
                        </div>

                        <!-- VOD Seek Bar Layer -->
                        <div id="vodControl" class="max-w-7xl mx-auto mt-6 hidden opacity-0 transition-all duration-300">
                            <input type="range" id="seekBar" class="w-full h-1.5 bg-white/20 rounded-full appearance-none cursor-pointer accent-blue-500" value="0" step="0.1">
                            <div class="flex justify-between mt-2 text-[10px] font-black text-white/40 tabular-nums">
                                <span id="currentTime">00:00</span>
                                <span id="duration">00:00</span>
                            </div>
                        </div>
                    </div>

                    <!-- Center Overlay (Loading/Error) -->
                    <div id="playbackOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/60 backdrop-blur-sm z-30 transition-all duration-500">
                        <div id="iptv-player-spinner" class="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin shadow-[0_0_20px_rgba(37,99,235,0.3)]"></div>
                        <h5 id="iptv-player-status" class="mt-6 text-xs font-black text-white uppercase tracking-[4px] animate-pulse">Establishing Connection...</h5>
                        
                        <div id="vlcFallback" class="mt-10 hidden animate-in zoom-in-95 duration-500">
                            <button id="vlcFallbackBtn" class="bg-gradient-to-br from-amber-500 to-orange-600 text-white text-[11px] font-black uppercase tracking-widest px-8 py-3 rounded-xl shadow-2xl hover:scale-105 active:scale-95 transition-all">
                                <i class="bi bi-play-btn-fill mr-3"></i>Open in External VLC
                            </button>
                            <p class="text-[9px] text-white/30 font-bold uppercase mt-4 text-center tracking-widest">High-bandwidth stability mode</p>
                        </div>
                    </div>
                </div>

                <!-- Idle Screen -->
                <div id="idleScreen" class="text-center space-y-6 animate-in zoom-in-95 duration-700">
                    <div class="w-24 h-24 rounded-full bg-blue-600/10 border border-blue-500/20 flex items-center justify-center text-blue-500 mx-auto shadow-2xl shadow-blue-500/5">
                        <i class="bi bi-play-circle-fill text-5xl"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-white uppercase tracking-tight">Ready for Stream</h2>
                        <p class="text-white/30 text-xs font-bold uppercase tracking-widest mt-2">Select a source from the channel library</p>
                    </div>
                </div>
            </div>

            <!-- Bottom Premium Info Bar (The HUD) -->
            <div id="channelInfo" class="absolute bottom-0 left-0 right-0 glass-footer border-t border-white/5 p-6 transform transition-all duration-700 translate-y-full opacity-0 z-50 pointer-events-none group-hover:pointer-events-auto">
                <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-6">
                    <!-- Identity -->
                    <div class="relative shrink-0 flex items-center justify-center">
                        <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 animate-pulse"></div>
                        <img id="currentLogo" src="" alt="" class="w-20 h-20 md:w-24 md:h-24 object-contain p-3 bg-white rounded-2xl shadow-2xl relative border-4 border-white/10">
                    </div>

                    <!-- Details -->
                    <div class="flex-grow text-center md:text-left space-y-3 min-w-0">
                        <div class="flex flex-wrap items-center justify-center md:justify-start gap-3">
                            <h1 id="currentName" class="text-2xl md:text-3xl font-black text-white uppercase tracking-tight truncate max-w-[400px]"></h1>
                            <span id="currentGroup" class="px-3 py-1 rounded-full bg-blue-600/20 border border-blue-500/20 text-[10px] font-black text-blue-400 uppercase tracking-widest"></span>
                            <span id="streamTypeBadge" class="hidden px-3 py-1 rounded-full bg-cyan-600/20 border border-cyan-500/20 text-[10px] font-black text-cyan-400 uppercase tracking-widest"></span>
                        </div>
                        
                        <div class="flex flex-wrap items-center justify-center md:justify-start gap-4">
                            <div id="statusContainer" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-emerald-500/20 border border-emerald-500/20 text-[10px] font-black text-emerald-400 uppercase tracking-[2px]">
                                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                <span id="statusLabel">LIVE</span>
                            </div>
                            
                            <div class="flex items-center bg-white/5 border border-white/5 rounded-xl px-4 py-1.5 gap-4">
                                <div class="flex items-center gap-2 border-r border-white/10 pr-4">
                                    <i class="bi bi-hdd-network text-blue-400"></i>
                                    <select id="sourceSelector" class="bg-transparent text-[10px] font-black text-white/50 uppercase tracking-widest outline-none cursor-pointer focus:text-white transition-colors">
                                        <option value="default">🚀 Smart Gateway</option>
                                        <option value="none">🔗 Direct Link</option>
                                        <option value="tracking">📊 Analysis Proxy</option>
                                        <option value="hls">⚡ HLS Tunnel</option>
                                        <option value="ts">📺 TS Stream</option>
                                    </select>
                                </div>
                                <span id="formatBadge" class="text-[10px] font-black text-white/40 uppercase tracking-widest min-w-[30px]">TYPE</span>
                                <div class="hidden md:flex items-center gap-2 border-l border-white/10 pl-4">
                                    <i class="bi bi-speedometer2 text-white/20"></i>
                                    <span id="qualityLabel" class="text-[10px] font-black text-white/60 uppercase tracking-widest">Checking...</span>
                                </div>
                                <span id="resBadge" class="text-[10px] font-black text-blue-500 uppercase tracking-[3px] border-l border-white/10 pl-4">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- Meta Actions -->
                    <div class="flex items-center gap-3">
                        <button id="vlcBtn" class="w-14 h-14 rounded-2xl bg-orange-600 shadow-lg shadow-orange-600/20 text-white flex items-center justify-center text-2xl hover:scale-110 active:scale-95 transition-all" title="Launch VLC Player"><i class="bi bi-play-btn-fill"></i></button>
                        <button id="favBtn" class="w-14 h-14 rounded-2xl bg-white/5 border border-white/5 text-white/40 hover:text-rose-500 hover:border-rose-500/20 hover:bg-rose-500/10 flex items-center justify-center text-xl transition-all" title="Add to Favorites"><i class="bi bi-heart-fill"></i></button>
                        <button id="shareBtn" class="w-14 h-14 rounded-2xl bg-white/5 border border-white/5 text-white/40 hover:text-white flex items-center justify-center text-xl transition-all" title="Share with Network"><i class="bi bi-share-fill"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="quickAddModal" class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="glass-panel overflow-hidden border-white/10 w-full animate-in zoom-in-95">
            <div class="px-6 py-4 flex items-center justify-between border-b border-white/5 bg-white/[0.02]">
                <h5 class="text-[10px] font-black text-white/60 uppercase tracking-[2px]">Quick Link Add</h5>
                <button type="button" class="text-white/20 hover:text-white" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="p-8 space-y-6">
                <div class="space-y-3">
                    <label class="block text-[10px] font-black text-white/30 uppercase tracking-widest ml-1">Target Playlist</label>
                    <select id="qaPlaylist" class="glass-control bg-slate-900/40 !text-xs">
                        <option value="">Select Playlist...</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="block text-[10px] font-black text-white/30 uppercase tracking-widest ml-1">Category (Group)</label>
                    <select id="qaGroup" class="glass-control bg-slate-900/40 !text-xs">
                        <option value="">Default/No Group</option>
                    </select>
                </div>
                <button id="qaConfirm" class="btn-premium w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600">
                    <span class="text-xs font-black uppercase tracking-widest">Confirm Sync</span>
                </button>
            </div>
        </div>
    </div>
</div>

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

    }

        color: #60a5fa;
    }

    .group-header {
        position: sticky;
        top: -1px;
        z-index: 10;
        background: rgba(2, 6, 23, 0.8);

        padding: 0.5rem 0.75rem;

</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
<script>
    const video = document.getElementById('video');
    const sidebar = document.getElementById('sidebar');
    const playerArea = document.getElementById('playerArea');
    const videoContainer = document.getElementById('videoContainer');
    const idleScreen = document.getElementById('idleScreen');
    const playlistSelector = document.getElementById('playlistSelector');
    const categorySelector = document.getElementById('categorySelector');
    const channelList = document.getElementById('channelList');
    const channelSearch = document.getElementById('channelSearch');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const openSidebar = document.getElementById('openSidebar');
    const overlay = document.getElementById('playbackOverlay');
    const infoBar = document.getElementById('channelInfo');
    const streamTypeBadge = document.getElementById('streamTypeBadge');
    const vodControl = document.getElementById('vodControl');
    const seekBar = document.getElementById('seekBar');
    const currentTimeText = document.getElementById('currentTime');
    const durationText = document.getElementById('duration');
    const sourceSelector = document.getElementById('sourceSelector');
    const topControls = document.getElementById('topControls');
    const customPlayPause = document.getElementById('customPlayPause');
    const customMute = document.getElementById('customMute');
    const customFullscreen = document.getElementById('customFullscreen');
    let hls = null;
    let mpegtsPlayer = null;
    let allChannels = [];
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let currentPlaylistId = null;
    let currentCategory = "";
    let lastGroup = null;
    let currentStreamUrl = null;
    let currentStatusController = null;
    let fallbackTriggered = false;
    let playbackAbortController = null;
    const initialChannelId = parseInt("{{ initial_id or 'null' }}") || null;
    const userApiToken = "{{ current_user.api_token if current_user.is_authenticated else '' }}";
    let isMpegTS = false;
    let isHls = false;

    // Sidebar Toggling
    function toggleSidebarUI(show) {
        if (window.innerWidth <= 768) {
            if (show) {
                sidebar.classList.add('mobile-active');
            } else {
                sidebar.classList.remove('mobile-active');
            }
        } else {
            if (show) {
                sidebar.classList.remove('collapsed');
                openSidebar.classList.add('hidden');
            } else {
                sidebar.classList.add('collapsed');
                openSidebar.classList.remove('hidden');
            }
        }
    }

    if (window.innerWidth <= 768) {
        sidebar.classList.remove('collapsed');
        toggleSidebar.classList.add('hidden');
        openSidebar.classList.add('hidden');
    }

    toggleSidebar.addEventListener('click', () => toggleSidebarUI(false));
    openSidebar.addEventListener('click', () => toggleSidebarUI(true));
    
    // Source Selector Hot-Switch
    sourceSelector.addEventListener('change', (e) => {
        const activeItem = document.querySelector('.channel-item.active');
        if (activeItem) {
            playStream(activeItem.dataset.url, activeItem, e.target.value);
        }
    });

    async function loadPlaylist(playlistId, autoPlayFirst = false) {
        currentPlaylistId = playlistId;
        currentPage = 1;
        hasMore = true;
        lastGroup = null;
        currentCategory = "";
        categorySelector.value = "";
        channelList.innerHTML = '';
        
        // Load Categories
        fetchCategories(playlistId);
        
        await fetchChannels(1, autoPlayFirst);
    }

    async function fetchCategories(playlistId) {
        try {
            const resp = await fetch(`/channels/web-player/categories/${playlistId}`);
            const data = await resp.json();
            if (data.status === 'ok') {
                let html = '<option value="" class="bg-dark">All Categories</option>';
                data.categories.forEach(cat => {
                    html += `<option value="${cat}" class="bg-dark">${cat}</option>`;
                });
                categorySelector.innerHTML = html;
            }
        } catch (err) { console.error(err); }
    }

    async function fetchChannels(page, autoPlayFirst = false) {
        if (isLoading || !hasMore) return;
        isLoading = true;
        
        const loader = document.createElement('div');
        loader.id = 'listLoader';
        loader.className = 'text-center py-3';
        loader.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div>';
        channelList.appendChild(loader);

        let url = `/channels/web-player/channels/${currentPlaylistId}?page=${page}&limit=100`;
        if (currentCategory) url += `&group=${encodeURIComponent(currentCategory)}`;
        const q = channelSearch.value.trim();
        if (q) url += `&q=${encodeURIComponent(q)}`;

        try {
            const resp = await fetch(url);
            const data = await resp.json();
            
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();

            if (data.status === 'ok') {
                renderChannels(data.channels);
                hasMore = data.has_more;
                currentPage = data.page;
                
                if (autoPlayFirst && page === 1 && data.channels.length > 0) {
                    const firstChannel = data.channels[0];
                    playStream(firstChannel.play_url, firstChannel);
                    setTimeout(() => {
                        const firstItem = document.querySelector('.channel-item');
                        if (firstItem) firstItem.classList.add('active');
                    }, 100);
                }
            }
        } catch (err) {
            console.error(err);
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();
        } finally {
            isLoading = false;
        }
    }

    function renderChannels(channels) {
        let html = '';
        const isSearching = channelSearch.value.trim().length > 0;
        
        channels.forEach(ch => {
            if (!isSearching && ch.group !== lastGroup) {
                html += `<div class="group-header text-[10px] font-black text-white/60 uppercase tracking-[2px]">${ch.group}</div>`;
                lastGroup = ch.group;
            }
            
            const statusColor = ch.status === 'live' ? 'bg-emerald-500' : (ch.status === 'die' ? 'bg-rose-500' : 'bg-slate-500');
            
            html += `
                <div class="channel-item p-3 flex items-center gap-4 cursor-pointer group/item" 
                     data-id="${ch.id}" data-url="${ch.play_url}" data-name="${ch.name}" data-logo="${ch.logo}" data-group="${ch.group}" data-status="${ch.status}">
                    <div class="relative w-12 h-12 shrink-0 p-2 bg-white rounded-xl shadow-lg ring-1 ring-black/5 flex items-center justify-center overflow-hidden">
                        <img src="${ch.logo || 'https://via.placeholder.com/40'}" class="w-full h-full object-contain">
                    </div>
                    <div class="flex-grow min-w-0">
                        <div class="channel-name text-xs font-bold text-white/90 truncate transition-colors group-hover/item:text-blue-400">${ch.name}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="w-1.5 h-1.5 rounded-full ${statusColor} ${ch.status === 'live' ? 'animate-pulse' : ''}"></span>
                            <span class="text-[9px] font-bold text-white/20 uppercase tracking-widest truncate">
                                ${ch.quality && ch.quality !== 'N/A' ? ch.quality + ' • ' : ''}${ch.resolution && ch.resolution !== 'N/A' ? ch.resolution : 'STREAM'}
                            </span>
                        </div>
                    </div>
                    <button class="w-8 h-8 rounded-lg bg-white/5 border border-white/5 text-white/20 hover:text-emerald-400 hover:bg-emerald-400/10 transition-all opacity-0 group-hover/item:opacity-100 flex items-center justify-center quick-add-btn" 
                            data-id="${ch.id}" data-name="${ch.name}" title="Quick Add">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            `;
        });
        
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        while (tempDiv.firstChild) {
            const child = tempDiv.firstChild;
            if (child.nodeType === 1 && child.classList.contains('channel-item')) {
                child.addEventListener('click', () => {
                    document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
                    child.classList.add('active');
                    playStream(child.dataset.url, child);
                    if (window.innerWidth <= 768) toggleSidebarUI(false);
                });
                
                const qBtn = child.querySelector('.quick-add-btn');
                if (qBtn) {
                    qBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        openQuickAdd(qBtn.dataset.id, qBtn.dataset.name);
                    });
                }
            }
            channelList.appendChild(child);
        }
    }

    // Category Selector
    categorySelector.addEventListener('change', (e) => {
        currentCategory = e.target.value;
        currentPage = 1;
        hasMore = true;
        lastGroup = null;
        channelList.innerHTML = '';
        fetchChannels(1, false);
    });

    // Scroll Listener
    channelList.addEventListener('scroll', () => {
        if (channelList.scrollTop + channelList.offsetHeight >= channelList.scrollHeight - 300) {
            if (!isLoading && hasMore) {
                fetchChannels(currentPage + 1);
            }
        }
    });

    function updateStatusToLive(id) {
        if (!id) return;
        const item = document.querySelector(`.channel-item[data-id="${id}"]`);
        if (item) {
            const dot = item.querySelector('span[style*="border-radius: 50%"]');
            if (dot) dot.style.backgroundColor = '#2ecc71';
        }
        
        const infoBar = document.getElementById('channelInfo');
        if (infoBar.dataset.currentId == id) {
            const statusContainer = document.getElementById('statusContainer');
            const statusLabel = document.getElementById('statusLabel');
            if (statusContainer) {
                statusContainer.className = `d-flex align-items-center gap-2 px-3 py-2 rounded-2 bg-success text-white fw-bold shadow-sm`;
            }
            if (statusLabel) statusLabel.innerText = 'LIVE';
        }
    }

    async function fetchChannelStatus(id, retry = true) {
        if (!id || id === 'null') return; // Prevents 404
        
        if (currentStatusController) {
            currentStatusController.abort();
        }
        currentStatusController = new AbortController();
        const signal = currentStatusController.signal;

        try {
            const resp = await fetch(`/channels/check/${id}?ajax=1`, { 
                method: 'POST',
                signal: signal
            });
            const data = await resp.json();
            
            // Only update if it's still the active ID (handle string vs int)
            const activeId = infoBar.dataset.currentId;
            if (activeId != id) return;
            
            if (data.success) {
                // If live but no quality, retry once after 1s
                if (data.status === 'live' && (!data.quality || data.quality === 'N/A' || data.quality === 'null') && retry) {
                    setTimeout(() => fetchChannelStatus(id, false), 1000);
                }

                // Update Sidebar Item
                const item = document.querySelector(`.channel-item[data-id="${id}"]`);
                if (item) {
                    const dot = item.querySelector('span[style*="border-radius: 50%"]');
                    const text = item.querySelector('span.text-light');
                    const statusColor = data.status === 'live' ? '#2ecc71' : (data.status === 'die' ? '#e74c3c' : '#95a5a6');
                    if (dot) dot.style.backgroundColor = statusColor;
                    if (text) {
                        let info = [];
                        if (data.quality && data.quality !== 'N/A') info.push(data.quality);
                        if (data.resolution && data.resolution !== 'N/A') info.push(data.resolution);
                        text.innerText = info.join(' • ');
                    }
                }

                // Update Bottom Bar
                if (infoBar.dataset.currentId == id) {
                    infoBar.dataset.status = data.status; // STORE STATUS
                    const statusContainer = document.getElementById('statusContainer');
                    const statusLabel = document.getElementById('statusLabel');
                    if (statusContainer) {
                        statusContainer.className = `d-flex align-items-center gap-2 px-3 py-2 rounded-2 ${data.status === 'live' ? 'bg-success' : 'bg-danger'} text-white fw-bold shadow-sm`;
                    }
                    if (statusLabel) statusLabel.innerText = data.status.toUpperCase();
                    if (data.status === 'die') {
                        // CRITICAL: Only show OFFLINE if video is NOT playing
                        if (video.paused || video.readyState < 2) {
                            overlay.classList.remove('d-none');
                            overlay.innerHTML = '<div class="text-danger"><i class="bi bi-exclamation-triangle display-4 mb-3"></i><h5>STREAM OFFLINE</h5><p class="small opacity-75">This channel is currently down.</p></div>';
                        }
                    }

                    const qualityLabel = document.getElementById('qualityLabel');
                    if (qualityLabel) {
                        const q = data.quality && data.quality !== 'N/A' ? data.quality.toUpperCase() : '';
                        qualityLabel.innerText = q ? `${q} • ${data.latency}MS` : `${data.latency}MS`;
                        if (!q && !data.latency) qualityLabel.innerText = 'LIVE';
                        qualityLabel.parentElement.classList.remove('d-none');
                    }
                    
                    const resBadge = document.getElementById('resBadge');
                    if (resBadge) {
                        resBadge.innerText = data.resolution || 'SD';
                        if (resBadge.innerText.includes('1920x1080')) resBadge.innerText = 'FHD 1080P';
                        else if (resBadge.innerText.includes('3840x2160')) resBadge.innerText = 'ULTRA HD 4K';
                        else if (resBadge.innerText.includes('1280x720')) resBadge.innerText = 'HD 720P';
                    }
                }
            }
        } catch (err) { 
            if (err.name === 'AbortError') return;
            console.error("Check failed:", err); 
        }
    }


    function formatTime(seconds) {
        if (!seconds) return "00:00";
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) return `${h}:${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
    }
    async function playStream(url, metaInput = {}, forcedType = null) {
        const meta = metaInput && metaInput.dataset ? {...metaInput.dataset} : (typeof metaInput === 'string' ? {name: metaInput} : {...metaInput});
        const sId = meta.id || meta.id_ || '';
        const sName = meta.name || '';
        
        // 1. Abort previous & Cleanup
        if (playbackAbortController) playbackAbortController.abort();
        playbackAbortController = new AbortController();
        const { signal } = playbackAbortController;

        window.IPTVPlayer.stop(video);

        // 2. Immediate UI Reset (After stop, so listeners can't overwrite)
        currentStreamUrl = url;
        forcedType = forcedType || sourceSelector.value;
        
        idleScreen.classList.add('d-none');
        videoContainer.classList.remove('d-none');
        infoBar.classList.remove('d-none');
        
        const statusLabel = document.getElementById('iptv-player-status');
        const spinner = document.getElementById('iptv-player-spinner');
        const vlcFallback = document.getElementById('vlcFallback');
        const vlcFallbackBtn = document.getElementById('vlcFallbackBtn');

        vlcFallback.classList.add('d-none');
        overlay.classList.remove('d-none');
        spinner.classList.remove('d-none');
        statusLabel.innerText = "VERIFYING STREAM...";
        statusLabel.className = "fw-bold text-white letter-spacing-1";

        // 3. Performing backend check (Check-First)
        let freshMeta = {...meta};
        try {
            const checkResp = await fetch(`/channels/check/${sId}?ajax=1`, { 
                method: 'POST',
                signal: signal
            });
            const checkData = await checkResp.json();
            
            if (checkData.success) {
                if (checkData.status === 'die') {
                    statusLabel.innerText = "LINK BROKEN (SERVER OFFLINE)";
                    statusLabel.className = "fw-bold text-danger letter-spacing-1";
                    spinner.classList.add('d-none');
                    vlcFallback.classList.remove('d-none');
                    return; // Link broken, do not play
                }
                
                // Update with fresh metadata from live check
                freshMeta.stream_type = checkData.stream_type;
                freshMeta.stream_format = checkData.stream_format;
                console.log("[Player] Fresh Metadata Checked:", checkData);
            }
        } catch (err) {
            if (err.name === 'AbortError') return;
            console.warn("Check-First failed, falling back to cached metadata", err);
        }

        // 3. Update UI Info Bar - Using final values after Check
        const sType = freshMeta.stream_type || 'live';
        const sFormat = freshMeta.stream_format || '';
        
        updateFormatBadge(url, false, false, sType, sId); // Temporary, engine will refine
        
        infoBar.dataset.currentId = sId;
        document.getElementById('currentName').innerText = sName;
        document.getElementById('currentGroup').innerText = freshMeta.group || '';
        document.getElementById('currentLogo').src = freshMeta.logo || 'https://via.placeholder.com/100';
        document.getElementById('channelInfo').classList.remove('d-none');
        document.getElementById('idleScreen').classList.add('d-none');
        document.getElementById('videoContainer').classList.remove('d-none');

        // 4. Start Playback
        window.IPTVPlayer.play(video, {
            id: sId,
            url: url,
            name: sName,
            stream_type: sType,
            stream_format: sFormat,
            forcedType: forcedType,
            token: userApiToken,
            overlay: overlay,
            statusLabel: statusLabel,
            onError: (err) => {
                statusLabel.innerText = "PLAYBACK ERROR";
                statusLabel.className = "fw-bold text-danger letter-spacing-1";
                spinner.classList.add('d-none');
                vlcFallback.classList.remove('d-none');
            },
            onStall: (msg) => {
                statusLabel.innerText = "STALLED - TRY VLC";
                vlcFallback.classList.remove('d-none');
            }
        });

        // 5. Update UI Technical Badges
        const isHls = url.toLowerCase().includes('.m3u8') || sType === 'hls' || sFormat === 'hls' || forcedType === 'hls';
        const isMpegTS = url.toLowerCase().includes('.ts') || sType === 'ts' || sFormat === 'ts' || forcedType === 'ts' || (forcedType === 'default' && !isHls);
        updateFormatBadge(url, isHls, isMpegTS, sType, sId);

        // 6. VLC Fallback Button Action
        vlcFallbackBtn.onclick = () => {
            const vlcBtn = document.getElementById('vlcBtn');
            if (vlcBtn) vlcBtn.click();
        };

        // 7. Update browser history
        if (sId) {
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('id', sId);
            window.history.replaceState({}, '', newUrl);
        }
    }
    
    function updateFormatBadge(url, isHls, isMpegTS, sType, sId) {
        const formatBadge = document.getElementById('formatBadge');
        if (formatBadge) {
            let detectUrl = url || "";
            let extension = detectUrl.split('?')[0].split('.').pop().toUpperCase();
            if (extension.length > 5 || extension.includes('/') || extension === 'PLAY' || !isNaN(extension)) {
                if (isHls) extension = 'HLS';
                else if (isMpegTS) extension = 'TS';
                else extension = 'LINK';
            }
            if (extension === 'M3U8') extension = 'HLS';
            formatBadge.innerText = extension;
            
            if (extension === 'HLS') formatBadge.className = 'badge bg-primary text-white';
            else if (extension === 'TS') formatBadge.className = 'badge bg-warning text-dark';
            else if (['MP4', 'MKV', 'AVI', 'MOV'].includes(extension)) formatBadge.className = 'badge bg-success text-white';
            else formatBadge.className = 'badge bg-secondary text-white';
        }

        if (sType) {
            streamTypeBadge.innerText = sType.toUpperCase();
            streamTypeBadge.style.display = 'inline-block';
            streamTypeBadge.className = `badge rounded-pill ${sType === 'vod' ? 'bg-warning text-dark' : 'bg-info text-dark'} border-0 px-3 py-1 shadow-sm fw-bold`;
        } else {
            streamTypeBadge.style.display = 'none';
        }
        if (typeof fetchChannelStatus === 'function') {
            fetchChannelStatus(sId);
        }
    }

    // Search Logic
    const clearSearch = document.getElementById('clearSearch');
    const searchBtn = document.getElementById('searchBtn');

    let searchTimeout;
    function performSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentPage = 1;
            hasMore = true;
            lastGroup = null;
            channelList.innerHTML = '';
            fetchChannels(1);
        }, 300);
    }

    channelSearch.addEventListener('input', performSearch);
    searchBtn.addEventListener('click', performSearch);
    clearSearch.addEventListener('click', () => {
        channelSearch.value = '';
        performSearch();
    });

    // Smart HUD Control
    let hudTimeout;
    
    function showHUD() {
        const statusLabel = document.getElementById('iptv-player-status');
        const isStatusActive = statusLabel && statusLabel.innerText && statusLabel.innerText.trim() !== "";
        
        if (!infoBar.dataset.currentId && !isStatusActive) return; // Only hide if idle
        infoBar.classList.remove('hud-hidden');
        infoBar.classList.add('hud-visible');
        topControls.classList.remove('opacity-0');
        
        // Show VOD seek bar if active
        if (!vodControl.classList.contains('d-none')) {
            vodControl.classList.remove('opacity-0');
            vodControl.style.pointerEvents = 'auto';
        }
        
        clearTimeout(hudTimeout);
        hudTimeout = setTimeout(hideHUD, 2000);
    }
    
    function hideHUD() {
        // Force show HUD if in ANY loading or error state
        const statusLabel = document.getElementById('iptv-player-status');
        if (statusLabel && statusLabel.innerText && statusLabel.innerText.trim() !== "") {
            const txt = statusLabel.innerText.toUpperCase();
            if (txt.includes('CONNECTING') || txt.includes('BUFFERING') || txt.includes('ERROR') || txt.includes('RECONNECTING')) {
                showHUD();
                return;
            }
        }

        if (infoBar.matches(':hover') || topControls.matches(':hover') || vodControl.matches(':hover')) {
            hudTimeout = setTimeout(hideHUD, 1000);
            return;
        }
        infoBar.classList.remove('hud-visible');
        infoBar.classList.add('hud-hidden');
        topControls.classList.add('opacity-0');
        vodControl.classList.add('opacity-0');
        vodControl.style.pointerEvents = 'none';
    }
    
    playerArea.addEventListener('mousemove', showHUD);
    playerArea.addEventListener('click', showHUD);
    playerArea.addEventListener('contextmenu', showHUD);
    playerArea.addEventListener('touchstart', showHUD, {passive: true});
    playerArea.addEventListener('mouseleave', hideHUD);

    // Also trigger on any mouse move in the window if HUD was recently hidden
    window.addEventListener('mousemove', (e) => {
        if (e.clientY > window.innerHeight - 150) { // Bottom threshold
            showHUD();
        }
    });
    
    infoBar.addEventListener('mouseenter', () => {
        clearTimeout(hudTimeout);
        infoBar.classList.add('hud-visible');
        infoBar.classList.remove('hud-hidden');
    });

    // Custom Controls Logic
    
    video.addEventListener('play', () => {
        customPlayPause.innerHTML = '<i class="bi bi-pause-fill"></i>';
    });
    video.addEventListener('pause', () => {
        customPlayPause.innerHTML = '<i class="bi bi-play-fill"></i>';
    });
    video.addEventListener('volumechange', () => {
        if (video.muted || video.volume === 0) {
            customMute.innerHTML = '<i class="bi bi-volume-mute-fill"></i>';
        } else {
            customMute.innerHTML = '<i class="bi bi-volume-up-fill"></i>';
        }
    });
    
    customPlayPause.addEventListener('click', () => {
        if (video.paused) video.play();
        else video.pause();
    });
    
    customMute.addEventListener('click', () => {
        video.muted = !video.muted;
    });


    customFullscreen.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            if (playerArea.requestFullscreen) {
                playerArea.requestFullscreen();
            } else if (playerArea.mozRequestFullScreen) { /* Firefox */
                playerArea.mozRequestFullScreen();
            } else if (playerArea.webkitRequestFullscreen) { /* Chrome, Safari and Opera */
                playerArea.webkitRequestFullscreen();
            } else if (playerArea.msRequestFullscreen) { /* IE/Edge */
                playerArea.msRequestFullscreen();
            }
            customFullscreen.innerHTML = '<i class="bi bi-fullscreen-exit"></i>';
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
            customFullscreen.innerHTML = '<i class="bi bi-arrows-fullscreen"></i>';
        }
    });

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            customFullscreen.innerHTML = '<i class="bi bi-arrows-fullscreen"></i>';
        } else {
            customFullscreen.innerHTML = '<i class="bi bi-fullscreen-exit"></i>';
        }
    });

    document.getElementById('vlcBtn').addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const activeId = document.getElementById('channelInfo').dataset.currentId;
        if (!activeId) return;
        
        // 1. Attempt Server-side launch (for local usage)
        fetch(`/channels/play_vlc/${activeId}`, { method: 'POST' })
            .then(resp => resp.json())
            .then(data => {
                if (!data.success) {
                    // 2. Fallback: Browser-side launch (for mobile/remote)
                    const absUrl = new URL(currentStreamUrl, window.location.origin).href;
                    const vlcIntent = `intent://${absUrl.replace(/^https?:\/\//, '')}#Intent;scheme=http;type=video/*;package=org.videolan.vlc;end`;
                    const schemes = [vlcIntent, `vlc://${absUrl}`, `vnd.vlc://${absUrl}`];
                    
                    let index = 0;
                    function tryNext() {
                        if (index >= schemes.length) return;
                        const link = document.createElement('a');
                        link.href = schemes[index];
                        link.click();
                        index++;
                        setTimeout(tryNext, 500);
                    }
                    tryNext();
                }
            })
            .catch(err => {
                console.error("VLC remote launch failed:", err);
            });
    });

    document.getElementById('favBtn').addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const activeId = document.getElementById('channelInfo').dataset.currentId;
        if (!activeId) return;
        alert('Đã thêm vào yêu thích!');
    });

    document.getElementById('shareBtn').addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const activeId = document.getElementById('channelInfo').dataset.currentId;
        if (!activeId) return;
        
        const shareUrl = window.location.href;
        if (navigator.share) {
            navigator.share({
                title: document.getElementById('currentName').innerText,
                url: shareUrl
            }).catch(console.error);
        } else {
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert('Đã sao chép liên kết vào bộ nhớ tạm!');
            });
        }
    });





    // Ensure overlay is hidden once video actually starts
    video.addEventListener('playing', () => {
        overlay.classList.add('d-none');
        // If it was die, force update to live since it's playing
        const statusLabel = document.getElementById('statusLabel');
        const statusContainer = document.getElementById('statusContainer');
        if (statusLabel && statusLabel.innerText === 'DIE') {
            statusLabel.innerText = 'LIVE';
            if (statusContainer) statusContainer.className = 'd-flex align-items-center gap-2 px-3 py-2 rounded-2 bg-success text-white fw-bold shadow-sm';
        }
    });

    // Stuck/Stalled Detection
    let stuckTimer = null;
    video.addEventListener('waiting', () => {
        if (stuckTimer) clearTimeout(stuckTimer);
        const formatBadge = document.getElementById('formatBadge');
        const isLiveTS = formatBadge && formatBadge.innerText === 'TS' && (!video.duration || video.duration === Infinity);

        stuckTimer = setTimeout(() => {
            if (video.paused || video.readyState < 3) { // 3 = HAVE_FUTURE_DATA
                if (isLiveTS) {
                    console.log("Live TS stream stuck, performing full REFRESH...");
                    // Use persisted metadata
                    playStream(currentStreamUrl, infoBar);
                } else {
                    console.log("Stream stuck, attempting auto-resume...");
                    if (video.currentTime > 0) video.currentTime += 0.1;
                    video.play().catch(() => {});
                }
            }
        }, isLiveTS ? 8000 : 5000); // Wait 8s for TS, 5s for others
    });

    video.addEventListener('playing', () => {
        if (stuckTimer) {
            clearTimeout(stuckTimer);
            stuckTimer = null;
        }
    });

    // Live TS Auto-Reconnect on Pause
    video.addEventListener('pause', () => {
        // We only care about Live TS (MPEG-TS over HTTP for IPTV)
        // because pausing causes them to drift from the live edge forever.
        // So we just REFRESH to the latest live point if they "pause".
        // Note: isMpegTS and currentStreamUrl are accessible here if globally defined
        if (typeof isMpegTS !== 'undefined' && isMpegTS && !video.ended) {
            console.log("Live TS paused, performing auto-refresh to stay live...");
            
            setTimeout(() => {
                if (video.paused && currentStreamUrl) {
                    playStream(currentStreamUrl, infoBar);
                }
            }, 1000); // 1s delay to distinguish between seek and actual pause
        }
    });

    // VOD Seek Bar Events
    video.addEventListener('timeupdate', () => {
        if (!video.duration) return;
        const percent = (video.currentTime / video.duration) * 100;
        seekBar.value = video.currentTime;
        const currentTimeText = document.getElementById('currentTime');
        if (currentTimeText) currentTimeText.innerText = formatTime(video.currentTime);
    });

    video.addEventListener('durationchange', () => {
        seekBar.max = video.duration;
        const durationText = document.getElementById('duration');
        if (durationText) durationText.innerText = formatTime(video.duration);
    });

    seekBar.addEventListener('input', () => {
        video.currentTime = seekBar.value;
    });

    // Initial Load
    playlistSelector.addEventListener('change', (e) => loadPlaylist(e.target.value, false));
    
    async function initPlayer() {
        if (initialChannelId) {
            try {
                const resp = await fetch(`/channels/api/channel/${initialChannelId}`);
                const data = await resp.json();
                if (data.status === 'ok') {
                    const plId = data.channel.playlist_id || playlistSelector.value;
                    playlistSelector.value = plId;
                    await loadPlaylist(plId, false);
                    playStream(data.channel.play_url, data.channel);
                    
                    // Highlight in list after a delay
                    setTimeout(() => {
                        const item = document.querySelector(`.channel-item[data-id="${initialChannelId}"]`);
                        if (item) item.classList.add('active');
                    }, 800);
                    return; // EXIT - Do not proceed to fallback!
                }
            } catch (err) { console.error("Auto-load failed:", err); }
        }
        
        // No initial ID or fetch failed: load first playlist and auto-play first channel
        if (playlistSelector.value) {
            await loadPlaylist(playlistSelector.value, true);
        }
    }

    // Quick Add Logic
    const qaModal = new bootstrap.Modal(document.getElementById('quickAddModal'));
    const qaPlaylistSelect = document.getElementById('qaPlaylist');
    const qaGroupSelect = document.getElementById('qaGroup');
    const qaConfirmBtn = document.getElementById('qaConfirm');
    let qaChannelId = null;
    let playlistsCache = null;

    async function openQuickAdd(channelId, channelName) {
        qaChannelId = channelId;
        qaModal.show();
        
        if (!playlistsCache) {
            try {
                const resp = await fetch('/channels/api/playlists_with_groups');
                const data = await resp.json();
                if (data.status === 'ok') {
                    playlistsCache = data.playlists;
                    renderQAPlaylists();
                }
            } catch (err) { console.error(err); }
        } else {
            renderQAPlaylists();
        }
    }

    function renderQAPlaylists() {
        let html = '<option value="" class="bg-dark">Select Playlist...</option>';
        playlistsCache.forEach(pl => {
            html += `<option value="${pl.id}" class="bg-dark">${pl.name}</option>`;
        });
        qaPlaylistSelect.innerHTML = html;
        qaGroupSelect.innerHTML = '<option value="" class="bg-dark">Default/No Group</option>';
    }

    qaPlaylistSelect.addEventListener('change', () => {
        const plId = qaPlaylistSelect.value;
        if (!plId) {
            qaGroupSelect.innerHTML = '<option value="" class="bg-dark">Default/No Group</option>';
            return;
        }
        
        const pl = playlistsCache.find(p => p.id == plId);
        if (pl && pl.groups) {
            let html = '<option value="" class="bg-dark">Default/No Group</option>';
            pl.groups.forEach(g => {
                html += `<option value="${g.id}" class="bg-dark">${g.name}</option>`;
            });
            qaGroupSelect.innerHTML = html;
        }
    });

    qaConfirmBtn.addEventListener('click', async () => {
        const plId = qaPlaylistSelect.value;
        const gId = qaGroupSelect.value;
        
        if (!plId) return alert('Please select a playlist');
        
        qaConfirmBtn.disabled = true;
        qaConfirmBtn.innerText = 'ADDING...';
        
        try {
            const resp = await fetch('/channels/api/quick_add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    channel_id: qaChannelId,
                    playlist_id: plId,
                    group_id: gId
                })
            });
            const data = await resp.json();
            if (data.status === 'ok') {
                qaModal.hide();
                alert('Channel added successfully!');
            } else {
                alert('Error: ' + data.message);
            }
        } catch (err) { alert('Request failed'); }
        finally {
            qaConfirmBtn.disabled = false;
            qaConfirmBtn.innerText = 'CONFIRM ADD';
        }
    });

    initPlayer();
</script>
