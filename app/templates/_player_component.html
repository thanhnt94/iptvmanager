<!-- Shared IPTV Player Component -->
<div id="iptv-player-container" class="iptv-player-container border rounded bg-dark overflow-hidden shadow-lg position-relative">
    <!-- Overlay for Buffering/Errors -->
    <div id="iptv-player-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-flex flex-column align-items-center justify-content-center bg-black bg-opacity-75 d-none" style="z-index: 10;">
        <div id="iptv-player-spinner" class="spinner-border text-primary mb-3"></div>
        <div id="iptv-player-status" class="small fw-bold text-white text-center px-3 text-uppercase letter-spacing-1">CONNECTING...</div>
        <div id="iptv-vlc-fallback" class="mt-3 d-none text-center">
            <button id="iptv-vlc-fallback-btn" class="btn btn-sm btn-warning fw-bold px-3 py-1 shadow-sm">
                <i class="bi bi-play-btn-fill me-1"></i>VLC FALLBACK
            </button>
        </div>
    </div>

    <!-- Video Element -->
    <div class="ratio ratio-16x9 bg-black d-flex align-items-center justify-content-center">
        <video id="iptv-video-element" class="w-100 h-100" playsinline></video>
    </div>

        <!-- VOD Controls (Seek Bar) -->
        <div id="iptv-vod-controls" class="mb-2 d-none transition-opacity" style="opacity: 0;">
            <div class="d-flex align-items-center gap-2 mb-1">
                <span id="iptv-current-time" class="small text-white-50 ms-1" style="font-size: 0.7rem;">00:00</span>
                <input type="range" id="iptv-seek-bar" class="form-range flex-grow-1 player-seek-bar shadow-none" min="0" value="0" step="1">
                <span id="iptv-duration" class="small text-white-50 me-1" style="font-size: 0.7rem;">00:00</span>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex gap-3 align-items-center">
                <button id="iptv-play-pause" class="btn btn-link text-white p-0 fs-4 shadow-none"><i class="bi bi-play-fill"></i></button>
                <div class="d-flex align-items-center gap-2">
                    <button id="iptv-mute" class="btn btn-link text-white p-0 fs-5 shadow-none"><i class="bi bi-volume-up-fill"></i></button>
                    <input type="range" id="iptv-volume-slider" class="form-range d-none d-md-inline-block" style="width: 80px;" min="0" max="1" step="0.1" value="1">
                </div>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span id="iptv-badge-live" class="badge bg-danger rounded-pill px-2 py-1 small fw-bold" style="font-size: 0.65rem;">LIVE</span>
                <button id="iptv-fullscreen" class="btn btn-link text-white p-0 fs-5 shadow-none"><i class="bi bi-fullscreen"></i></button>
            </div>
        </div>
</div>

<style>
    .iptv-player-container:hover #iptv-player-hud { opacity: 1 !important; }
    .transition-opacity { transition: opacity 0.3s ease-in-out; }
    #iptv-video-element::-webkit-media-controls { display:none !important; }
    
    .player-seek-bar {
        height: 6px;
        background: rgba(255,255,255,0.2);
        border-radius: 3px;
        cursor: pointer;
    }
    .player-seek-bar::-webkit-slider-thumb {
        width: 14px;
        height: 14px;
        background: #0d6efd;
        border: 2px solid white;
        box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }
</style>

<script>
/**
 * UI Logic for the Shared Component
 */
document.addEventListener('DOMContentLoaded', function() {
    const video = document.getElementById('iptv-video-element');
    const hud = document.getElementById('iptv-player-hud');
    const playBtn = document.getElementById('iptv-play-pause');
    const muteBtn = document.getElementById('iptv-mute');
    const volSlider = document.getElementById('iptv-volume-slider');
    const fsBtn = document.getElementById('iptv-fullscreen');
    const container = document.getElementById('iptv-player-container');

    // 1. Play/Pause
    const togglePlay = () => video.paused ? video.play() : video.pause();
    playBtn.onclick = togglePlay;
    video.onclick = togglePlay;

    video.onplay = () => playBtn.innerHTML = '<i class="bi bi-pause-fill"></i>';
    video.onpause = () => playBtn.innerHTML = '<i class="bi bi-play-fill"></i>';

    // 2. Volume
    muteBtn.onclick = () => {
        video.muted = !video.muted;
        muteBtn.innerHTML = video.muted ? '<i class="bi bi-volume-mute-fill"></i>' : '<i class="bi bi-volume-up-fill"></i>';
    };
    volSlider.oninput = (e) => {
        video.volume = e.target.value;
        video.muted = false;
        muteBtn.innerHTML = video.volume == 0 ? '<i class="bi bi-volume-mute-fill"></i>' : '<i class="bi bi-volume-up-fill"></i>';
    };

    // 3. Fullscreen
    fsBtn.onclick = () => {
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(err => alert(`Error: ${err.message}`));
        } else {
            document.exitFullscreen();
        }
    };

    // 4. VOD Logic
    const vodControls = document.getElementById('iptv-vod-controls');
    const seekBar = document.getElementById('iptv-seek-bar');
    const currentTimeText = document.getElementById('iptv-current-time');
    const durationText = document.getElementById('iptv-duration');
    const liveBadge = document.getElementById('iptv-badge-live');

    const formatTime = (sec) => {
        if (!sec || isNaN(sec)) return "00:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    };

    video.addEventListener('timeupdate', () => {
        if (!video.duration || isNaN(video.duration)) return;
        seekBar.value = video.currentTime;
        currentTimeText.innerText = formatTime(video.currentTime);
    });

    video.addEventListener('durationchange', () => {
        if (!video.duration || isNaN(video.duration)) return;
        seekBar.max = video.duration;
        durationText.innerText = formatTime(video.duration);
        
        // Auto-show VOD controls if duration is finite
        if (isFinite(video.duration) && video.duration > 0) {
            vodControls.classList.remove('d-none');
            setTimeout(() => vodControls.style.opacity = '1', 50);
            liveBadge.innerText = 'VOD';
            liveBadge.classList.replace('bg-danger', 'bg-info');
            liveBadge.classList.add('text-dark');
        } else {
            vodControls.classList.add('d-none');
            vodControls.style.opacity = '0';
            liveBadge.innerText = 'LIVE';
            liveBadge.classList.replace('bg-info', 'bg-danger');
            liveBadge.classList.remove('text-dark');
        }
    });

    seekBar.oninput = () => video.currentTime = seekBar.value;

    // 5. HUD Auto-hide
    let hudTimeout;
    const showHUD = () => {
        hud.style.opacity = '1';
        clearTimeout(hudTimeout);
        hudTimeout = setTimeout(() => { if(!video.paused) hud.style.opacity = '0'; }, 3000);
    };
    container.onmousemove = showHUD;
    container.onclick = showHUD;
    video.onplaying = showHUD;
});
</script>
