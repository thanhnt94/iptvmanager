<!-- Shared IPTV Player Component -->
<div id="iptv-player-container" class="group relative bg-black rounded-[1.5rem] overflow-hidden shadow-2xl border border-white/10 aspect-video select-none">
    <!-- Overlay for Buffering/Errors -->
    <div id="iptv-player-overlay" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm hidden transition-all duration-300">
        <div id="iptv-player-spinner" class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4 shadow-lg shadow-blue-500/20"></div>
        <div id="iptv-player-status" class="text-[10px] font-black tracking-[3px] text-white/60 uppercase">Connecting...</div>
        <div id="iptv-vlc-fallback" class="mt-6 hidden">
            <button id="iptv-vlc-fallback-btn" class="bg-gradient-to-br from-amber-500 to-orange-600 text-white text-[10px] font-black uppercase tracking-widest px-6 py-2.5 rounded-xl shadow-xl hover:scale-105 active:scale-95 transition-all">
                <i class="bi bi-play-btn-fill mr-2"></i>VLC Fallback
            </button>
        </div>
    </div>

    <!-- Video Element -->
    <div class="absolute inset-0 flex items-center justify-center bg-black">
        <video id="iptv-video-element" class="w-full h-full object-contain" playsinline></video>
    </div>

    <!-- Interactive HUD Layer -->
    <div id="iptv-player-hud" class="absolute inset-0 z-10 flex flex-col justify-end p-6 bg-gradient-to-t from-black/80 via-black/20 to-transparent transition-opacity duration-500 opacity-0 group-hover:opacity-100">
        <!-- VOD Controls (Seek Bar) -->
        <div id="iptv-vod-controls" class="mb-4 hidden">
            <div class="flex items-center gap-4 mb-2">
                <span id="iptv-current-time" class="text-[10px] font-black text-white/60 tabular-nums">00:00</span>
                <input type="range" id="iptv-seek-bar" class="flex-grow h-1.5 bg-white/20 rounded-full appearance-none cursor-pointer accent-blue-500 hover:accent-blue-400 transition-all" min="0" value="0" step="1">
                <span id="iptv-duration" class="text-[10px] font-black text-white/60 tabular-nums">00:00</span>
            </div>
        </div>

        <div class="flex justify-between items-center bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-3 px-5 shadow-2xl">
            <div class="flex gap-6 align-items-center">
                <button id="iptv-play-pause" class="text-white hover:text-blue-400 transition-all transform active:scale-75">
                    <i class="bi bi-play-fill text-2xl"></i>
                </button>
                <div class="flex items-center gap-4 group/vol">
                    <button id="iptv-mute" class="text-white hover:text-blue-400 transition-all">
                        <i class="bi bi-volume-up-fill text-xl"></i>
                    </button>
                    <input type="range" id="iptv-volume-slider" class="w-0 group-hover/vol:w-20 overflow-hidden transition-all duration-300 h-1 bg-white/20 rounded-full appearance-none cursor-pointer accent-blue-500" min="0" max="1" step="0.1" value="1">
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex flex-col items-end mr-2">
                    <span id="iptv-badge-live" class="text-readable-small font-black text-white px-2 py-0.5 rounded-full bg-rose-600 shadow-lg shadow-rose-600/30 uppercase tracking-widest">Live</span>
                </div>
                <button id="iptv-fullscreen" class="text-white hover:text-blue-400 transition-all transform active:scale-75">
                    <i class="bi bi-fullscreen text-lg"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Prevent default controls from showing */
    #iptv-video-element::-webkit-media-controls { display:none !important; }
    
    /* Custom Seek Bar Styling */
    #iptv-seek-bar::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        background: #3b82f6;
        border: 2px solid white;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        transition: transform 0.1s ease;
    }
    #iptv-seek-bar:hover::-webkit-slider-thumb {
        transform: scale(1.2);
    }
</style>

<script>
/**
 * UI Logic for the Tailwind-based Shared Player Component
 */
document.addEventListener('DOMContentLoaded', function() {
    const video = document.getElementById('iptv-video-element');
    const hud = document.getElementById('iptv-player-hud');
    const playBtn = document.getElementById('iptv-play-pause');
    const muteBtn = document.getElementById('iptv-mute');
    const volSlider = document.getElementById('iptv-volume-slider');
    const fsBtn = document.getElementById('iptv-fullscreen');
    const container = document.getElementById('iptv-player-container');
    const vodControls = document.getElementById('iptv-vod-controls');
    const seekBar = document.getElementById('iptv-seek-bar');
    const currentTimeText = document.getElementById('iptv-current-time');
    const durationText = document.getElementById('iptv-duration');
    const liveBadge = document.getElementById('iptv-badge-live');

    // Safe HUD access
    const setHUDOpacity = (op) => {
        if (hud) hud.style.opacity = op;
    };

    // 1. Play/Pause
    const togglePlay = () => video.paused ? video.play() : video.pause();
    if(playBtn) playBtn.onclick = togglePlay;
    if(video) video.onclick = togglePlay;

    video.onplay = () => { if(playBtn) playBtn.innerHTML = '<i class="bi bi-pause-fill text-2xl"></i>'; };
    video.onpause = () => { if(playBtn) playBtn.innerHTML = '<i class="bi bi-play-fill text-2xl"></i>'; };

    // 2. Volume
    if(muteBtn) {
        muteBtn.onclick = () => {
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '<i class="bi bi-volume-mute-fill text-xl"></i>' : '<i class="bi bi-volume-up-fill text-xl"></i>';
        };
    }
    if(volSlider) {
        volSlider.oninput = (e) => {
            video.volume = e.target.value;
            video.muted = false;
            if(muteBtn) muteBtn.innerHTML = video.volume == 0 ? '<i class="bi bi-volume-mute-fill text-xl"></i>' : '<i class="bi bi-volume-up-fill text-xl"></i>';
        };
    }

    // 3. Fullscreen
    if(fsBtn) {
        fsBtn.onclick = () => {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.error(`Error: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        };
    }

    // 4. VOD Logic
    const formatTime = (sec) => {
        if (!sec || isNaN(sec)) return "00:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    };

    video.addEventListener('timeupdate', () => {
        if (!video.duration || isNaN(video.duration)) return;
        if(seekBar) seekBar.value = video.currentTime;
        if(currentTimeText) currentTimeText.innerText = formatTime(video.currentTime);
    });

    video.addEventListener('durationchange', () => {
        if (!video.duration || isNaN(video.duration)) return;
        if(seekBar) seekBar.max = video.duration;
        if(durationText) durationText.innerText = formatTime(video.duration);
        
        // Priority: Use explicit _isExplicitLive metadata if available
        const isActuallyLive = (video._isExplicitLive === true) || !isFinite(video.duration) || video.duration <= 0;

        if (!isActuallyLive) {
            if(vodControls) vodControls.classList.remove('hidden');
            if(liveBadge) {
                liveBadge.innerText = 'VOD';
                liveBadge.classList.replace('bg-rose-600', 'bg-blue-600');
            }
        } else {
            if(vodControls) vodControls.classList.add('hidden');
            if(liveBadge) {
                liveBadge.innerText = 'LIVE';
                liveBadge.classList.replace('bg-blue-600', 'bg-rose-600');
            }
        }
    });

    if(seekBar) seekBar.oninput = () => video.currentTime = seekBar.value;

    // 5. HUD Auto-hide Improvement
    let hudTimeout;
    const showHUD = () => {
        setHUDOpacity('1');
        clearTimeout(hudTimeout);
        hudTimeout = setTimeout(() => { if(!video.paused) setHUDOpacity('0'); }, 3000);
    };
    
    container.addEventListener('mousemove', showHUD);
    container.addEventListener('click', showHUD);
    video.addEventListener('playing', showHUD);
});
</script>
