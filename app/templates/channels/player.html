{% extends "base.html" %}

{% block content %}
<div class="fixed inset-0 bg-[#020617] overflow-hidden flex flex-col md:pt-[48px]">
    <!-- Mobile Quick Nav Header (Compact 5-page arrangement) -->
    <div class="md:hidden flex items-center justify-between px-6 py-3 bg-slate-900/60 backdrop-blur-xl border-b border-white/5 shrink-0 z-[60]">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/20">
                <i class="bi bi-broadcast text-white"></i>
            </div>
            <span class="text-xs font-black text-white uppercase tracking-wider">Manager</span>
        </div>
        <div class="flex items-center gap-5">
            <a href="{{ url_for('index') }}" class="text-white/40 hover:text-white transition-all"><i class="bi bi-house-door text-lg"></i></a>
            <a href="{{ url_for('channels.active_sessions_page') }}" class="text-white/40 hover:text-white transition-all"><i class="bi bi-broadcast text-lg"></i></a>
            <a href="{{ url_for('admin_portal') }}" class="text-white/40 hover:text-white transition-all"><i class="bi bi-gear text-lg"></i></a>
            <a href="{{ url_for('auth.admin_users') }}" class="text-white/40 hover:text-white transition-all"><i class="bi bi-people text-lg"></i></a>
            <a href="{{ url_for('auth.logout') }}" class="text-rose-500/50 hover:text-rose-500 transition-all ml-2"><i class="bi bi-box-arrow-right text-lg"></i></a>
        </div>
    </div>

    <!-- Main Content Container (Sidebar + Player) -->
    <div class="flex-grow flex flex-col md:flex-row overflow-hidden relative h-full">
        
        <!-- Premium Sidebar -->
        <div id="sidebar" class="w-full md:w-80 md:min-w-80 md:max-w-80 shrink-0 glass-panel !rounded-none border-y-0 border-l-0 border-r border-white/10 flex flex-col transition-all duration-500 z-30 overflow-hidden active order-2 md:order-1 flex-1 md:flex-none min-h-0 relative">
            <!-- Sidebar Header & Search -->
            <div class="p-3 md:p-6 md:pt-10 space-y-2 md:space-y-4 border-b border-white/5 bg-white/[0.02]">
                <div class="flex items-center justify-between md:flex hidden">
                    <h5 class="text-xs font-black text-white/50 uppercase tracking-[2px]">Channel Library</h5>
                    <button id="toggleSidebar" class="md:block hidden text-white/40 hover:text-white transition-colors">
                        <i class="bi bi-layout-sidebar-inset text-lg"></i>
                    </button>
                </div>
                
                <!-- Robust Grid Filters -->
                <div class="flex flex-col gap-2">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="playlistSelector" class="glass-control !py-1.5 !text-[10px] md:!text-xs bg-slate-900/40 w-full min-w-0">
                            {% for pl in playlists %}
                            <option value="{{ pl.id }}">{{ pl.name }}</option>
                            {% endfor %}
                        </select>
                        <select id="categorySelector" class="glass-control !py-1.5 !text-[10px] md:!text-xs bg-slate-900/40 w-full min-w-0">
                            <option value="">All Categories</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="relative flex-grow">
                            <button id="searchBtn" class="absolute left-2.5 top-1/2 -translate-y-1/2 text-white/40">
                                <i class="bi bi-search text-[10px] md:text-xs"></i>
                            </button>
                            <input type="text" id="channelSearch" class="glass-control !pl-8 md:!pl-10 !py-1.5 md:!py-2 !text-[10px] md:!text-xs bg-slate-950/20 w-full" placeholder="Find channels...">
                            <button id="clearSearch" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-white/20 hover:text-white hidden"><i class="bi bi-x-lg text-[10px]"></i></button>
                        </div>
                        <button id="resetFilters" class="shrink-0 w-8 h-8 md:w-9 md:h-9 flex items-center justify-center rounded-lg md:rounded-xl bg-white/5 border border-white/5 text-white/40 hover:text-blue-400 transition-all shadow-lg" title="Reset All Filters">
                            <i class="bi bi-arrow-counterclockwise text-base md:text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- List Content -->
            <div id="channelList" class="flex-grow overflow-y-auto custom-scrollbar p-2 space-y-1">
                <!-- Skeleton / Initial state -->
                <div class="py-12 text-center animate-pulse">
                    <div class="w-10 h-10 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
                    <span class="text-xs font-black text-white/40 uppercase tracking-widest">Synchronizing...</span>
                </div>
            </div>
        </div>

        <!-- Main Workspace (Player Area Container) -->
        <div class="w-full md:w-0 md:flex-1 min-w-0 shrink-0 relative flex flex-col bg-black overflow-hidden order-1 md:order-2">
            <!-- Floating Sidebar Trigger (Quick List) -->
            <button id="openSidebar" class="absolute left-6 top-1/2 -translate-y-1/2 w-14 h-14 rounded-2xl bg-blue-600/20 backdrop-blur-xl border border-blue-500/30 shadow-2xl shadow-blue-500/10 text-blue-400 opacity-0 pointer-events-none z-[35] hover:bg-blue-600 hover:text-white hover:scale-110 active:scale-95 transition-all flex items-center justify-center animate-in slide-in-from-left-4" title="Open Channel List">
                <i class="bi bi-list text-2xl"></i>
            </button>

            <!-- Video Context Area -->
            <div id="playerArea" class="flex-grow relative flex items-center justify-center group overflow-hidden">
                <!-- Video Element Layer -->
                <div id="videoContainer" class="absolute inset-0 hidden">
                    <video id="video" class="w-full h-full object-contain" playsinline></video>
                    
                    <!-- Top HUD Controls (Auto-hide) -->
                    <div id="topControls" class="absolute top-0 left-0 right-0 p-6 pt-8 bg-gradient-to-b from-black/80 via-black/20 to-transparent opacity-0 transition-opacity duration-500 z-40 pointer-events-none group-hover:pointer-events-auto">
                        <div class="flex items-center justify-between max-w-7xl mx-auto">
                            <div class="flex items-center gap-6">
                                <button id="customPlayPause" class="text-white hover:text-blue-400 text-2xl transition-all"><i class="bi bi-pause-fill"></i></button>
                                <button id="customMute" class="text-white hover:text-blue-400 text-2xl transition-all"><i class="bi bi-volume-up-fill"></i></button>
                            </div>
                            <div class="flex items-center gap-4">
                                <div id="streamClock" class="text-xs font-black text-white/50 uppercase tracking-[3px]">LIVE ENCRYPTED</div>
                                <button id="customFullscreen" class="text-white hover:text-blue-400 text-xl transition-all"><i class="bi bi-arrows-fullscreen"></i></button>
                            </div>
                        </div>

                        <!-- VOD Seek Bar Layer -->
                        <div id="vodControl" class="max-w-7xl mx-auto mt-6 hidden opacity-0 transition-all duration-300">
                            <input type="range" id="seekBar" class="w-full h-1.5 bg-white/20 rounded-full appearance-none cursor-pointer accent-blue-500" value="0" step="0.1">
                            <div class="flex justify-between mt-2 text-xs font-black text-white/50 tabular-nums">
                                <span id="currentTime">00:00</span>
                                <span id="duration">00:00</span>
                            </div>
                        </div>
                    </div>

                    <!-- Center Overlay (Loading/Error) -->
                    <div id="playbackOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/90 z-[45] transition-all duration-500">
                        <div id="iptv-player-spinner" class="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin shadow-[0_0_20px_rgba(37,99,235,0.3)]"></div>
                        <h5 id="iptv-player-status" class="mt-6 text-[10px] font-black text-white uppercase tracking-[4px] animate-pulse">Establishing Connection...</h5>
                        
                        <div id="vlcFallback" class="mt-10 hidden animate-in zoom-in-95 duration-500">
                            <button id="vlcFallbackBtn" class="bg-gradient-to-br from-amber-500 to-orange-600 text-white text-[11px] font-black uppercase tracking-widest px-8 py-3 rounded-xl shadow-2xl hover:scale-105 active:scale-95 transition-all">
                                <i class="bi bi-play-btn-fill mr-3"></i>Open in External VLC
                            </button>
                            <p class="text-readable-small text-white/30 font-bold uppercase mt-4 text-center tracking-widest">High-bandwidth stability mode</p>
                        </div>
                    </div>
                </div>

                <!-- Idle Screen -->
                <div id="idleScreen" class="text-center space-y-6 animate-in zoom-in-95 duration-700">
                    <div class="w-24 h-24 rounded-full bg-blue-600/10 border border-blue-500/20 flex items-center justify-center text-blue-500 mx-auto shadow-2xl shadow-blue-500/5">
                        <i class="bi bi-play-circle-fill text-5xl"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-white uppercase tracking-tight">Ready for Stream</h2>
                        <p class="text-white/30 text-xs font-bold uppercase tracking-widest mt-2">Select a source from the channel library</p>
                    </div>
                </div>
            </div>
            
 


            <!-- Bottom Premium Info Bar (The HUD) -->
            <div id="channelInfo" class="absolute bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur-2xl border-t border-white/10 p-3 md:p-6 transform transition-all duration-700 translate-y-full opacity-0 z-50 pointer-events-none group-hover:pointer-events-auto">
                <div class="max-w-7xl mx-auto flex flex-row items-center gap-2 md:gap-6">
                    <!-- Column 1: Identity (Logo) -->
                    <div class="relative shrink-0 flex items-center justify-center">
                        <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 animate-pulse"></div>
                        <img id="currentLogo" src="" alt="" class="w-12 h-12 md:w-24 md:h-24 object-contain p-1.5 md:p-3 bg-white rounded-lg md:rounded-2xl shadow-2xl relative border-2 md:border-4 border-white/10" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9InJnYmEoMzcsIDk5LCAyMzUsIDAuOCkiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cmVjdCB4PSIyIiB5PSI3IiB3aWR0aD0iMjAiIGhlaWdodD0iMTUiIHJ4PSIyIi8+PHBhdGggZD0iTTcgMmw1IDVNMTEgMmw1LTUiLz48L3N2Zz4='; this.onerror=null; this.className+=' p-1 opacity-50';">
                    </div>

                    <!-- Column 2: Details & Stats (Middle Column) -->
                    <div class="flex-grow flex flex-col justify-center min-w-0 space-y-0.5 md:space-y-3">
                        <!-- Top Row: Identity -->
                        <div class="flex flex-nowrap items-center gap-1.5 md:gap-3 overflow-hidden">
                            <h1 id="currentName" class="text-[10px] md:text-3xl font-black text-white uppercase tracking-tight truncate max-w-full md:max-w-[500px]"></h1>
                            <span id="currentGroup" class="shrink-0 px-1 py-0 md:px-3 md:py-1 rounded-full bg-blue-600/20 border border-blue-500/20 text-[6px] md:text-xs font-black text-blue-400 uppercase tracking-widest whitespace-nowrap"></span>
                            <span id="streamTypeBadge" class="shrink-0 px-1 py-0 md:px-3 md:py-1 rounded-full bg-cyan-600/20 border border-cyan-500/20 text-[6px] md:text-xs font-black text-cyan-400 uppercase tracking-widest whitespace-nowrap hidden"></span>
                        </div>
                        
                        <!-- Bottom Row: Multi-Stat Badges (The "Desktop Stats" Layout) -->
                        <div class="flex flex-nowrap items-center gap-1 md:gap-4 overflow-x-auto no-scrollbar">
                            <!-- Live Label -->
                            <div id="statusContainer" class="flex items-center gap-1 md:gap-2 px-1 py-0.5 md:px-3 md:py-1.5 rounded bg-emerald-500/20 border border-emerald-500/20 text-[6px] md:text-xs font-black text-emerald-400 uppercase tracking-[0.5px] md:tracking-[2px] whitespace-nowrap">
                                <span class="w-1 md:w-2 h-1 md:h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                <span id="statusLabel">LIVE</span>
                            </div>
                            
                            <!-- Technical Badges Row (Exactly like Desktop Image 1) -->
                            <div class="flex items-center bg-white/5 border border-white/5 rounded-md md:rounded-xl px-1.5 md:px-4 py-0.5 md:py-1.5 gap-1 md:gap-4 whitespace-nowrap">
                                <div class="flex items-center gap-0.5 md:gap-2 border-r border-white/10 pr-1 md:pr-4">
                                    <i class="bi bi-hdd-network text-blue-400 text-[6px] md:text-base"></i>
                                    <select id="sourceSelector" class="bg-transparent text-[6px] md:text-xs font-black text-white/50 uppercase tracking-widest outline-none cursor-pointer focus:text-white transition-colors">
                                        <option value="default">🚀 SMART</option>
                                        <option value="none">🔗 DIRECT</option>
                                        <option value="tracking">📊 PROXY</option>
                                        <option value="hls">⚡ HLS</option>
                                        <option value="ts">📺 TS</option>
                                    </select>
                                </div>
                                <span id="formatBadge" class="text-[6px] md:text-xs font-black text-white/50 uppercase tracking-widest min-w-[15px] md:min-w-[30px] border-r border-white/10 pr-1 md:pr-0 md:border-r-0">TYPE</span>
                                <div class="hidden md:flex items-center gap-2 border-l border-white/10 pl-4">
                                    <i class="bi bi-speedometer2 text-white/40"></i>
                                    <span id="qualityLabel" class="text-xs font-black text-white/60 uppercase tracking-widest">Checking...</span>
                                </div>
                                <span id="resBadge" class="text-[6px] md:text-xs font-black text-blue-500 uppercase tracking-[1px] md:tracking-[3px] border-l border-white/10 pl-1 md:pl-4">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- Column 3: Actions -->
                    <div class="flex items-center gap-1 md:gap-3 shrink-0">
                        <button id="vlcBtn" class="w-7 h-7 md:w-14 md:h-14 rounded bg-orange-600 shadow-lg shadow-orange-600/20 text-white flex items-center justify-center text-[10px] md:text-2xl hover:scale-110 active:scale-95 transition-all" title="Launch VLC Player"><i class="bi bi-play-btn-fill"></i></button>
                        <button id="favBtn" class="w-7 h-7 md:w-14 md:h-14 rounded bg-white/5 border border-white/5 text-white/40 hover:text-rose-500 hover:border-rose-500/20 hover:bg-rose-500/10 flex items-center justify-center text-[10px] md:text-xl transition-all" title="Add to Favorites"><i class="bi bi-heart-fill"></i></button>
                        <button id="shareBtn" class="w-7 h-7 md:w-14 md:h-14 rounded bg-white/5 border border-white/5 text-white/40 hover:text-white flex items-center justify-center text-[10px] md:text-xl transition-all" title="Share with Network"><i class="bi bi-share-fill"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Quick Sync Modal (Tailwind Migration) -->
<div id="quickAddModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-950/80 backdrop-blur-md animate-in fade-in duration-300">
    <div class="modal-dialog modal-dialog-centered relative w-full max-w-md p-4">
        <div class="glass-panel overflow-hidden border-white/10 w-full animate-in zoom-in-95">
            <div class="px-6 py-4 flex items-center justify-between border-b border-white/5 bg-white/[0.02]">
                <h5 class="text-xs font-black text-white/60 uppercase tracking-[2px]">Quick Sync</h5>
                <button type="button" class="text-white/40 hover:text-white transition-all hover:rotate-90" onclick="toggleModal('quickAddModal')">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="p-8 space-y-6">
                <div class="space-y-3">
                    <label class="block text-xs font-black text-white/50 uppercase tracking-widest ml-1">Target Playlist</label>
                    <select id="qaPlaylist" class="glass-control bg-slate-900/40 !text-xs">
                        <option value="">Select Playlist...</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="block text-xs font-black text-white/50 uppercase tracking-widest ml-1">Category (Group)</label>
                    <select id="qaGroup" class="glass-control bg-slate-900/40 !text-xs">
                        <option value="">Default/No Group</option>
                    </select>
                </div>
                <button id="qaConfirm" class="btn-primary w-full py-4 rounded-xl shadow-lg shadow-blue-600/20">
                    <span class="text-xs font-black uppercase tracking-widest">Confirm Sync</span>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Premium Scrolling */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.05); border-radius: 20px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.5); }

    /* HUD Transitions */
    .hud-hidden {
        opacity: 0 !important;
        transform: translateY(2rem) scale(0.98);
        pointer-events: none;
    }
    .hud-visible {
        opacity: 1 !important;
        transform: translateY(0) scale(1);
        pointer-events: auto;
    }

    #sidebar.collapsed {
        transform: translateX(-100%);
    }
    
    @media (max-width: 768px) {
        #sidebar {
            position: relative !important;
            inset: auto;
            width: 100% !important;
            height: auto !important;
            flex-grow: 1;
            transform: none !important;
            z-index: 1;
            background: transparent !important;
        }
        #playerArea {
            min-height: auto !important;
            aspect-ratio: 16 / 9;
            flex-grow: 0 !important;
            flex-shrink: 0;
        }
    }

    .channel-item {
        border-radius: 1rem;
        padding: 0.75rem 1rem !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid transparent;
        margin-bottom: 0.25rem;
    }
    .channel-item:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.05);
        transform: translateX(4px);
    }
    .channel-item.active {
        background: linear-gradient(90deg, rgba(37, 99, 235, 0.15) 0%, rgba(37, 99, 235, 0.05) 100%);
        border-color: rgba(37, 99, 235, 0.3);
    }
    .channel-item.active .channel-name {
        color: #60a5fa;
        font-size: 0.875rem; /* text-sm */
    }

    .group-header {
        position: sticky;
        top: -1px;
        z-index: 10;
        background: rgba(2, 6, 23, 0.8);
        backdrop-filter: blur(12px);
        margin: 1.5rem 0.5rem 0.5rem 0.5rem;
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
    }

    /* TV Mode Focus */
    .channel-item:focus, .channel-item.focused {
        outline: none;
        background: rgba(37, 99, 235, 0.2) !important;
        border-color: rgba(37, 99, 235, 0.4) !important;
        transform: scale(1.02) translateX(8px);
        box-shadow: 0 10px 30px -10px rgba(37, 99, 235, 0.3);
        z-index: 20;
    }

    /* Fixed Dropdown Styling */
    select {
        color-scheme: dark !important;
    }
    select option {
        background-color: #0f172a !important;
        color: white !important;
    }

    /* Scroll Utilities */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
<script>
    const video = document.getElementById('video');
    const sidebar = document.getElementById('sidebar');
    const playerArea = document.getElementById('playerArea');
    const videoContainer = document.getElementById('videoContainer');
    const idleScreen = document.getElementById('idleScreen');
    const playlistSelector = document.getElementById('playlistSelector');
    const categorySelector = document.getElementById('categorySelector');
    const channelList = document.getElementById('channelList');
    const channelSearch = document.getElementById('channelSearch');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const openSidebar = document.getElementById('openSidebar');
    const overlay = document.getElementById('playbackOverlay');
    const infoBar = document.getElementById('channelInfo');
    const streamTypeBadge = document.getElementById('streamTypeBadge');
    const statusLabel = document.getElementById('statusLabel');
    const statusContainer = document.getElementById('statusContainer');
    const qualityLabel = document.getElementById('qualityLabel');
    const formatBadge = document.getElementById('formatBadge');
    const resBadge = document.getElementById('resBadge');
    const vodControl = document.getElementById('vodControl');
    const seekBar = document.getElementById('seekBar');
    const currentTimeText = document.getElementById('currentTime');
    const durationText = document.getElementById('duration');
    const sourceSelector = document.getElementById('sourceSelector');
    const resetFilters = document.getElementById('resetFilters');
    const topControls = document.getElementById('topControls');
    const customPlayPause = document.getElementById('customPlayPause');
    const customMute = document.getElementById('customMute');
    const customFullscreen = document.getElementById('customFullscreen');
    let hls = null;
    let mpegtsPlayer = null;
    let allChannels = [];
    let currentPage = 1;
    let isLoading = false;
    let hasMore = true;
    let currentPlaylistId = null;
    let currentCategory = "";
    let lastGroup = null;
    let currentStreamUrl = null;
    let currentStatusController = null;
    let fallbackTriggered = false;
    let playbackAbortController = null;
    const initialChannelId = parseInt("{{ initial_id or 'null' }}") || null;
    const userApiToken = "{{ current_user.api_token if current_user.is_authenticated else '' }}";
    let isMpegTS = false;
    let isHls = false;

    // Sidebar Toggling
    function toggleSidebarUI(show) {
        if (window.innerWidth <= 768) {
            if (show) {
                sidebar.classList.add('mobile-active');
            } else {
                sidebar.classList.remove('mobile-active');
            }
        } else {
            if (show) {
                sidebar.classList.remove('collapsed');
                openSidebar.classList.add('opacity-0');
                openSidebar.style.pointerEvents = 'none';
            } else {
                sidebar.classList.add('collapsed');
                // The HUD logic will handle showing it with opacity
            }
        }
    }

    if (window.innerWidth <= 768) {
        sidebar.classList.remove('collapsed');
        toggleSidebar.classList.add('hidden');
        openSidebar.classList.add('hidden');
    }

    toggleSidebar.addEventListener('click', () => toggleSidebarUI(false));
    openSidebar.addEventListener('click', () => toggleSidebarUI(true));
    
    // Source Selector Hot-Switch
    sourceSelector.addEventListener('change', (e) => {
        const activeItem = document.querySelector('.channel-item.active');
        if (activeItem) {
            playStream(activeItem.dataset.url, activeItem, e.target.value);
        }
    });

    async function loadPlaylist(playlistId, autoPlayFirst = false) {
        currentPlaylistId = playlistId;
        currentPage = 1;
        hasMore = true;
        lastGroup = null;
        currentCategory = "";
        categorySelector.value = "";
        channelList.innerHTML = '';
        
        // Load Categories
        fetchCategories(playlistId);
        
        await fetchChannels(1, autoPlayFirst);
    }

    async function fetchCategories(playlistId) {
        try {
            const resp = await fetch(`/channels/web-player/categories/${playlistId}`);
            const data = await resp.json();
            if (data.status === 'ok') {
                let html = '<option value="" class="bg-dark">All Categories</option>';
                data.categories.forEach(cat => {
                    html += `<option value="${cat}" class="bg-dark">${cat}</option>`;
                });
                categorySelector.innerHTML = html;
            }
        } catch (err) { console.error(err); }
    }

    async function fetchChannels(page, autoPlayFirst = false) {
        if (isLoading || !hasMore) return;
        isLoading = true;
        
        const loader = document.createElement('div');
        loader.id = 'listLoader';
        loader.className = 'text-center py-3';
        loader.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div>';
        channelList.appendChild(loader);

        let url = `/channels/web-player/channels/${currentPlaylistId}?page=${page}&limit=100`;
        if (currentCategory) url += `&group=${encodeURIComponent(currentCategory)}`;
        const q = channelSearch.value.trim();
        if (q) url += `&q=${encodeURIComponent(q)}`;

        try {
            const resp = await fetch(url);
            const data = await resp.json();
            
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();

            if (data.status === 'ok') {
                renderChannels(data.channels);
                hasMore = data.has_more;
                currentPage = data.page;
                
                if (autoPlayFirst && page === 1 && data.channels.length > 0) {
                    const firstChannel = data.channels[0];
                    playStream(firstChannel.play_url, firstChannel);
                    setTimeout(() => {
                        const firstItem = document.querySelector('.channel-item');
                        if (firstItem) firstItem.classList.add('active');
                    }, 100);
                }
            }
        } catch (err) {
            console.error(err);
            const existingLoader = document.getElementById('listLoader');
            if (existingLoader) existingLoader.remove();
        } finally {
            isLoading = false;
        }
    }

    async function fetchChannelStatus(id, retry = true) {
        if (!id || id === 'null') return; // Prevents 404
        
        if (currentStatusController) {
            currentStatusController.abort();
        }
        currentStatusController = new AbortController();
        const signal = currentStatusController.signal;

        try {
            const resp = await fetch(`/channels/check/${id}?ajax=1`, { 
                method: 'POST',
                signal: signal
            });
            const data = await resp.json();
            
            // Only update if it's still the active ID (handle string vs int)
            const activeId = infoBar.dataset.currentId;
            if (activeId != id) return;
            
            if (data.success) {
                // If live but no quality, retry once after 1s
                if (data.status === 'live' && (!data.quality || data.quality === 'N/A' || data.quality === 'null') && retry) {
                    setTimeout(() => fetchChannelStatus(id, false), 1000);
                }

                // Update Sidebar Item
                const item = document.querySelector(`.channel-item[data-id="${id}"]`);
                if (item) {
                    const dot = item.querySelector('span[style*="border-radius: 50%"]');
                    const text = item.querySelector('span.text-light');
                    const statusColor = data.status === 'live' ? '#2ecc71' : (data.status === 'die' ? '#e74c3c' : '#95a5a6');
                    if (dot) dot.style.backgroundColor = statusColor;
                    if (text) {
                        let info = [];
                        if (data.quality && data.quality !== 'N/A') info.push(data.quality);
                        if (data.resolution && data.resolution !== 'N/A') info.push(data.resolution);
                        text.innerText = info.join(' • ');
                    }
                }

                // Update Bottom Bar
                if (infoBar.dataset.currentId == id) {
                    infoBar.dataset.status = data.status; // STORE STATUS
                    if (statusContainer) {
                        statusContainer.className = `flex items-center gap-2 px-3 py-1.5 rounded-lg ${data.status === 'live' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/20 text-rose-400 border border-rose-500/20'} text-xs font-black uppercase tracking-[2px]`;
                    }
                    if (statusLabel) statusLabel.innerText = data.status.toUpperCase();
                    if (data.status === 'die') {
                        // Notify but don't block playback if it's already running
                        console.warn("Channel reported as OFFLINE by status check");
                    }

                    const qualityLabel = document.getElementById('qualityLabel');
                    if (qualityLabel) {
                        const q = data.quality && data.quality !== 'N/A' ? data.quality.toUpperCase() : '';
                        qualityLabel.innerText = q ? `${q} • ${data.latency}MS` : `${data.latency}MS`;
                        if (!q && !data.latency) qualityLabel.innerText = 'LIVE';
                        qualityLabel.parentElement.classList.remove('hidden');
                    }
                    
                    const resBadge = document.getElementById('resBadge');
                    if (resBadge) {
                        resBadge.innerText = data.resolution || 'SD';
                        if (resBadge.innerText.includes('1920x1080')) resBadge.innerText = 'FHD 1080P';
                        else if (resBadge.innerText.includes('3840x2160')) resBadge.innerText = 'ULTRA HD 4K';
                        else if (resBadge.innerText.includes('1280x720')) resBadge.innerText = 'HD 720P';
                    }
                }
            }
        } catch (err) { 
            if (err.name === 'AbortError') return;
            console.error("Check failed:", err); 
        }
    }


    function formatTime(seconds) {
        if (!seconds) return "00:00";
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) return `${h}:${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        return `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
    }
    async function playStream(url, metaInput = {}, forcedType = null) {
        const meta = metaInput && metaInput.dataset ? {...metaInput.dataset} : (typeof metaInput === 'string' ? {name: metaInput} : {...metaInput});
        const sId = meta.id || meta.id_ || '';
        const sName = meta.name || '';
        
        // 1. Abort previous & Cleanup
        if (playbackAbortController) playbackAbortController.abort();
        playbackAbortController = new AbortController();
        const { signal } = playbackAbortController;

        // Clean playback state
        window.IPTVPlayer.stop(video);

        // 2. Immediate UI Reset (After stop, so listeners can't overwrite)
        currentStreamUrl = url;
        forcedType = forcedType || sourceSelector.value;
        
        idleScreen.classList.add('hidden');
        videoContainer.classList.remove('hidden');
        infoBar.classList.remove('hidden');
        
        const overlayStatus = document.getElementById('iptv-player-status');
        const spinner = document.getElementById('iptv-player-spinner');
        const vlcFallback = document.getElementById('vlcFallback');
        const vlcFallbackBtn = document.getElementById('vlcFallbackBtn');

        vlcFallback.classList.add('hidden');
        overlay.classList.remove('hidden');
        spinner.classList.remove('hidden');
        overlayStatus.innerText = "VERIFYING STREAM...";
        overlayStatus.className = "fw-bold text-white letter-spacing-1";

        // 2.5 Immediate HUD Identity Update (Before check)
        infoBar.dataset.currentId = sId;
        document.getElementById('currentName').innerText = sName;
        document.getElementById('currentGroup').innerText = meta.group || '';
        document.getElementById('currentLogo').src = meta.logo || ''; // Fallback handled by onerror
        showHUD();

        // 3. Performing backend check (Check-First) with 4s Timeout
        let freshMeta = {...meta};
        const checkController = new AbortController();
        const timeoutId = setTimeout(() => checkController.abort(), 4000);
        
        try {
            const checkResp = await fetch(`/channels/check/${sId}?ajax=1`, { 
                method: 'POST',
                signal: AbortSignal.any([signal, checkController.signal])
            });
            clearTimeout(timeoutId);
            const checkData = await checkResp.json();
            
            if (checkData.success) {
                if (checkData.status === 'die') {
                    // Update badge but DON'T block playback in Smart mode
                    console.warn("Channel reported as OFFLINE by status check");
                }
                
                // Update with fresh metadata from live check
                freshMeta.stream_type = checkData.stream_type;
                freshMeta.stream_format = checkData.stream_format;
                console.log("[Player] Fresh Metadata Checked:", checkData);
            }
        } catch (err) {
            if (err.name === 'AbortError') return;
            console.warn("Check-First failed, falling back to cached metadata", err);
        }

        // 3. Status Check Done - Identity is already set, just update technical state if needed
        const sType = freshMeta.stream_type || 'live';
        const sFormat = freshMeta.stream_format || '';
        
        updateFormatBadge(url, false, false, sType, sId); 
        
        document.getElementById('idleScreen').classList.add('hidden');
        document.getElementById('videoContainer').classList.remove('hidden');

        // 4. Start Playback
        window.IPTVPlayer.play(video, {
            id: sId,
            url: url,
            name: sName,
            stream_type: sType,
            stream_format: sFormat,
            forcedType: forcedType,
            token: userApiToken,
            overlay: overlay,
            statusLabel: overlayStatus,
            onError: (err) => {
                overlayStatus.innerText = "PLAYBACK ERROR";
                overlayStatus.className = "fw-bold text-danger letter-spacing-1";
                spinner.classList.add('hidden');
                vlcFallback.classList.remove('hidden');
            },
            onStall: (msg) => {
                overlayStatus.innerText = "STALLED - TRY VLC";
                vlcFallback.classList.remove('hidden');
            }
        });

        // 5. Update Global Detection State (Sync with core engine regex)
        const lowUrl = url.toLowerCase();
        isHls = lowUrl.includes('.m3u8') || lowUrl.includes('m3u8') || (lowUrl.includes('hls') && !lowUrl.includes('type=ts') && !lowUrl.includes('output=ts')) || sType === 'hls' || sFormat === 'hls' || forcedType === 'hls';
        isMpegTS = lowUrl.includes('.ts') || lowUrl.includes('mpegts') || lowUrl.includes('type=ts') || lowUrl.includes('output=ts') || lowUrl.includes('.flv') || sType === 'ts' || sFormat === 'ts' || sFormat === 'flv' || forcedType === 'ts' || (forcedType === 'default' && !isHls);
        updateFormatBadge(url, isHls, isMpegTS, sType, sId);

        // 6. Final UI Touch: Ensure UI-specific containers are shown/hidden
        video.addEventListener('playing', () => {
            overlay.classList.add('hidden');
            idleScreen.classList.add('hidden');
            videoContainer.classList.remove('hidden');
        });
        if (!video.paused && video.readyState >= 2) {
            overlay.classList.add('hidden');
            idleScreen.classList.add('hidden');
            videoContainer.classList.remove('hidden');
        }

        // 6. VLC Fallback Button Action
        vlcFallbackBtn.onclick = () => {
            const vlcBtn = document.getElementById('vlcBtn');
            if (vlcBtn) vlcBtn.click();
        };

        // 7. Update browser history
        if (sId) {
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('id', sId);
            window.history.replaceState({}, '', newUrl);
        }
    }
    
    function updateFormatBadge(url, isHls, isMpegTS, sType, sId) {
        if (formatBadge) {
            let detectUrl = url || "";
            let extension = detectUrl.split('?')[0].split('.').pop().toUpperCase();
            if (extension.length > 5 || extension.includes('/') || extension === 'PLAY' || !isNaN(extension)) {
                if (isHls) extension = 'HLS';
                else if (isMpegTS) extension = 'TS';
                else extension = 'LINK';
            }
            if (extension === 'M3U8') extension = 'HLS';
            formatBadge.innerText = extension;
        }

        if (sType && streamTypeBadge) {
            streamTypeBadge.innerText = sType.toUpperCase();
            streamTypeBadge.classList.remove('hidden');
        } else if (streamTypeBadge) {
            streamTypeBadge.classList.add('hidden');
        }
        if (typeof fetchChannelStatus === 'function') {
            fetchChannelStatus(sId);
        }
    }

            const txt = statusLabel.innerText.toUpperCase();
            if (txt.includes('CONNECTING') || txt.includes('BUFFERING') || txt.includes('ERROR') || txt.includes('RECONNECTING')) {

        // 1. Attempt Server-side launch (for local usage)
        fetch(`/channels/play_vlc/${activeId}`, { method: 'POST' })
            .then(resp => resp.json())
            .then(data => {
                if (!data.success) {
                    // 2. Fallback: Browser-side launch (for mobile/remote)
                    const absUrl = new URL(currentStreamUrl, window.location.origin).href;
                    const vlcIntent = `intent://${absUrl.replace(/^https?:\/\//, '')}#Intent;scheme=http;type=video/*;package=org.videolan.vlc;end`;
                    const schemes = [vlcIntent, `vlc://${absUrl}`, `vnd.vlc://${absUrl}`];
                    
                    let index = 0;
                    function tryNext() {
                        if (index >= schemes.length) return;
                        const link = document.createElement('a');
                        link.href = schemes[index];
                        link.click();
                        index++;
                        setTimeout(tryNext, 500);
                    }
                    tryNext();
                }
            })
            .catch(err => {
                console.error("VLC remote launch failed:", err);
            });
    });

        const percent = (video.currentTime / video.duration) * 100;
        seekBar.value = video.currentTime;
        const currentTimeText = document.getElementById('currentTime');
        if (currentTimeText) currentTimeText.innerText = formatTime(video.currentTime);
    });

    video.addEventListener('durationchange', () => {
        seekBar.max = video.duration;
        const durationText = document.getElementById('duration');
        if (durationText) durationText.innerText = formatTime(video.duration);
    });

    seekBar.addEventListener('input', () => {
        video.currentTime = seekBar.value;
    });

    // Initial Load
    playlistSelector.addEventListener('change', (e) => loadPlaylist(e.target.value, false));
    
    async function initPlayer() {
        if (initialChannelId) {
            try {
                const resp = await fetch(`/channels/api/channel/${initialChannelId}`);
                const data = await resp.json();
                if (data.status === 'ok') {
                    const plId = data.channel.playlist_id || playlistSelector.value;
                    playlistSelector.value = plId;
                    await loadPlaylist(plId, false);
                    playStream(data.channel.play_url, data.channel);
                    
                    // Highlight in list after a delay
                    setTimeout(() => {
                        const item = document.querySelector(`.channel-item[data-id="${initialChannelId}"]`);
                        if (item) item.classList.add('active');
                    }, 800);
                    return; // EXIT - Do not proceed to fallback!
                }
            } catch (err) { console.error("Auto-load failed:", err); }
        }
        
        // No initial ID or fetch failed: load first playlist and auto-play first channel
        if (playlistSelector.value) {
            await loadPlaylist(playlistSelector.value, true);
        }
    }

    // Keyboard / TV Mode Navigation
    let focusedIndex = -1;
    document.addEventListener('keydown', (e) => {
        const items = Array.from(document.querySelectorAll('.channel-item'));
        if (items.length === 0) return;

        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            e.preventDefault();
            if (e.key === 'ArrowDown') focusedIndex++;
            else focusedIndex--;

            if (focusedIndex < 0) focusedIndex = items.length - 1;
            if (focusedIndex >= items.length) focusedIndex = 0;

            items.forEach((item, idx) => {
                if (idx === focusedIndex) {
                    item.classList.add('focused');
                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    item.classList.remove('focused');
                }
            });
            showHUD(); // Wake up HUD on navigation
        }

        if (e.key === 'Enter' && focusedIndex !== -1) {
            e.preventDefault();
            items[focusedIndex].click();
        }

        // Sidebar Toggle (TV shortcut)
        if (e.key === 'm' || e.key === 'M') {
            const isCollapsed = sidebar.classList.contains('collapsed');
            toggleSidebarUI(isCollapsed);
        }
    });

    // Quick Add Logic (Tailwind Migration)
    const qaPlaylistSelect = document.getElementById('qaPlaylist');
    const qaGroupSelect = document.getElementById('qaGroup');
    const qaConfirmBtn = document.getElementById('qaConfirm');
    let qaChannelId = null;
    let playlistsCache = null;

    async function openQuickAdd(channelId, channelName) {
        qaChannelId = channelId;
        window.toggleModal('quickAddModal');
        
        if (!playlistsCache) {
            try {
                const resp = await fetch('/channels/api/playlists_with_groups');
                const data = await resp.json();
                if (data.status === 'ok') {
                    playlistsCache = data.playlists;
                    renderQAPlaylists();
                }
            } catch (err) { console.error(err); }
        } else {
            renderQAPlaylists();
        }
    }

    function renderQAPlaylists() {
        let html = '<option value="" class="bg-dark">Select Playlist...</option>';
        playlistsCache.forEach(pl => {
            html += `<option value="${pl.id}" class="bg-dark">${pl.name}</option>`;
        });
        qaPlaylistSelect.innerHTML = html;
        qaGroupSelect.innerHTML = '<option value="" class="bg-dark">Default/No Group</option>';
    }

    qaPlaylistSelect.addEventListener('change', () => {
        const plId = qaPlaylistSelect.value;
        if (!plId) {
            qaGroupSelect.innerHTML = '<option value="" class="bg-dark">Default/No Group</option>';
            return;
        }
        
        const pl = playlistsCache.find(p => p.id == plId);
        if (pl && pl.groups) {
            let html = '<option value="" class="bg-dark">Default/No Group</option>';
            pl.groups.forEach(g => {
                html += `<option value="${g.id}" class="bg-dark">${g.name}</option>`;
            });
            qaGroupSelect.innerHTML = html;
        }
    });

    qaConfirmBtn.addEventListener('click', async () => {
        const plId = qaPlaylistSelect.value;
        const gId = qaGroupSelect.value;
        
        if (!plId) return alert('Please select a playlist');
        
        qaConfirmBtn.disabled = true;
        qaConfirmBtn.innerText = 'ADDING...';
        
        try {
            const resp = await fetch('/channels/api/quick_add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    channel_id: qaChannelId,
                    playlist_id: plId,
                    group_id: gId
                })
            });
            const data = await resp.json();
            if (data.status === 'ok') {
                window.toggleModal('quickAddModal');
                // Custom notification instead of alert
                const notify = document.createElement('div');
                notify.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-8 py-4 rounded-2xl shadow-2xl font-black uppercase tracking-widest text-xs z-[100] animate-in slide-in-from-bottom-4 fade-in duration-500';
                notify.innerText = 'Channel Synchronized Successfully';
                document.body.appendChild(notify);
                setTimeout(() => notify.remove(), 3000);
            } else {
                alert('Error: ' + data.message);
            }
        } catch (err) { alert('Request failed'); }
        finally {
            qaConfirmBtn.disabled = false;
            qaConfirmBtn.innerText = 'CONFIRM ADD';
        }
    });

    initPlayer();
</script>
    </div>
</div>

<style>
    @media (max-width: 768px) {
        nav.sticky { display: none !important; }
    }
</style>
{% endblock %}
